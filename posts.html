<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركات أبا مالك العقيلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .post-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; overflow: hidden; margin-bottom: 24px; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ef4444; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md p-4 border-b border-white/10 flex justify-between items-center">
        <a href="index.html" class="text-gray-400"><i class="fas fa-arrow-right text-xl"></i></a>
        <h1 class="text-xl font-black tracking-widest text-red-500">مشاركات أبا مالك</h1>
        <div class="w-6"></div> </header>

    <div class="container mx-auto px-4 py-6 max-w-md">
        
        <div class="post-card animate__animated animate__fadeInUp">
            <div class="p-4 flex items-center gap-3">
                <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="profile-img">
                <div>
                    <h4 class="font-bold text-sm">أبا مالك العقيلي</h4>
                    <span class="text-[10px] text-gray-400">منذ ساعة • إشراف هندسي</span>
                </div>
            </div>
            <div class="px-4 pb-3">
                <p class="text-sm leading-relaxed">
                    الدقة في العمل هي سر النجاح. لقطة من موقع العمل اليوم، حيث نضع القواعد لغدٍ أفضل.
                </p>
            </div>
            <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="w-full h-64 object-cover">
            <div class="p-4 flex justify-between border-t border-white/5">
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="far fa-heart text-red-500"></i> 125</button>
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="far fa-comment"></i> 45</button>
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="fas fa-share"></i></button>
            </div>
        </div>

        <div class="post-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <div class="p-4 flex items-center gap-3">
                <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="profile-img">
                <div>
                    <h4 class="font-bold text-sm">أبا مالك العقيلي</h4>
                    <span class="text-[10px] text-gray-400">أمس • حكمة اليوم</span>
                </div>
            </div>
            <div class="p-8 bg-gradient-to-br from-red-900/40 to-black text-center">
                <i class="fas fa-quote-right text-red-500 mb-4 text-2xl"></i>
                <p class="text-xl font-black leading-relaxed italic">
                    "كُنْ مَاهِراً لِيَحْتَاجَكَ النَّاس، وَكُنْ هَيِّناً لِيُحِبَّكَ النَّاس."
                </p>
            </div>
            <div class="p-4 flex justify-between border-t border-white/5">
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="fas fa-heart text-red-500"></i> 340</button>
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="far fa-comment"></i> 12</button>
                <button class="flex items-center gap-2 text-gray-400 text-sm"><i class="fas fa-share"></i></button>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-white/10 p-4 flex justify-around items-center">
        <a href="index.html" class="text-gray-400"><i class="fas fa-home text-xl"></i></a>
        <button class="bg-red-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-red-600/30">
            <i class="fas fa-plus text-white text-xl"></i>
        </button>
        <a href="azkar.html" class="text-gray-400"><i class="fas fa-book-open text-xl"></i></a>
    </nav>

</body>
  </html>
