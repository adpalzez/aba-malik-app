<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن المسجد | أبا مالك العقيلي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #022c22; color: white; margin: 0; padding: 0; }
        .header-gradient { background: linear-gradient(180deg, #134e4a 0%, #022c22 100%); border-radius: 0 0 40px 40px; }
        .prayer-card { background: #f8fafc; color: #1e293b; border-radius: 25px; transition: all 0.3s ease; }
        .active-prayer { background: #fbbf24 !important; color: #064e3b !important; transform: scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .countdown-display { background: rgba(0,0,0,0.3); border: 1px solid rgba(52, 211, 153, 0.2); border-radius: 30px; }
        .back-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        #locationTag { cursor: pointer; transition: 0.3s; }
        #locationTag:active { transform: scale(0.95); background: #d1fae5; }
    </style>
</head>
<body class="pb-32">
    <div class="max-w-[450px] mx-auto min-h-screen">
        
        <header class="header-gradient p-6 text-center shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <a href="index.html" class="back-btn transition active:scale-90">
                    <i class="fas fa-chevron-right text-white text-lg"></i>
                </a>
                <div class="text-center">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">أبا مالك العقيلي</p>
                    <p id="currentTime" class="text-sm font-black text-white">00:00:00</p>
                </div>
                <i class="fas fa-mosque text-3xl text-yellow-500"></i>
            </div>

            <div class="countdown-display p-6 mb-6 shadow-inner animate__animated animate__fadeIn">
                <p id="nextPrayerLabel" class="text-xs text-emerald-300 font-bold mb-2 italic">جاري الحساب...</p>
                <div id="countdownTimer" class="text-4xl font-black tracking-tighter text-white">00 : 00 : 00</div>
            </div>

            <div class="bg-black/20 rounded-3xl p-4 border border-white/5 flex justify-between items-center">
                <div class="text-right">
                    <p id="hDate" class="text-yellow-500 font-black text-sm"></p>
                    <p id="gDate" class="text-white/50 text-[10px]"></p>
                </div>
                <button onclick="requestNotification()" class="text-emerald-400 hover:text-white transition">
                    <i id="notifIcon" class="fas fa-bell"></i>
                </button>
            </div>
        </header>

        <main class="px-5 mt-8">
            <div class="bg-white rounded-[40px] p-6 shadow-2xl mb-8">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 class="text-xl font-black text-emerald-900 underline decoration-yellow-500 decoration-4 underline-offset-8">المواقيت</h2>
                    <span id="locationTag" onclick="resetLocation()" class="text-[9px] bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold shadow-sm flex items-center gap-1">
                        <i class="fas fa-location-dot"></i> جاري التحديد...
                    </span>
                </div>
                
                <div id="prayerGrid" class="grid grid-cols-3 gap-3"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="activateCompass()" class="bg-emerald-900/40 p-5 rounded-[30px] border border-emerald-800 text-center active:scale-95 transition">
                    <i id="compassIcon" class="fas fa-compass text-3xl text-yellow-400 mb-2"></i>
                    <p class="font-bold text-xs">اتجاة القبلة</p>
                </button>
                <a href="https://quran.com/ar" target="_blank" class="bg-emerald-900/40 p-5 rounded-[30px] border border-emerald-800 text-center active:scale-95 transition">
                    <i class="fas fa-book-quran text-3xl text-yellow-400 mb-2"></i>
                    <p class="font-bold text-xs">المصحف الكريم</p>
                </a>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#022c22]/95 backdrop-blur-lg p-4 flex justify-around border-t border-white/10 z-[100]">
            <a href="index.html" class="flex flex-col items-center gap-1 opacity-50 transition hover:opacity-100">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[9px] font-bold">الرئيسية</span>
            </a>
            <div class="flex flex-col items-center gap-1 text-yellow-500">
                <i class="fas fa-mosque text-xl"></i>
                <span class="text-[9px] font-bold">المسجد</span>
            </div>
        </nav>
    </div>

    <script>
        let timings = {};
        let notificationEnabled = false;

        async function initApp() {
            const savedLat = localStorage.getItem('aba_malik_lat');
            const savedLon = localStorage.getItem('aba_malik_lon');

            if (savedLat && savedLon) {
                document.getElementById('locationTag').innerHTML = '<i class="fas fa-bookmark"></i> موقع محفوظ';
                await getLivePrayers(savedLat, savedLon);
            } else {
                requestNewLocation();
            }
        }

        // طلب إذن الإشعارات
        async function requestNotification() {
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    notificationEnabled = true;
                    document.getElementById('notifIcon').className = 'fas fa-bell-slash text-yellow-500';
                    alert("تم تفعيل إشعار العد التنازلي في شاشة التليفون.");
                }
            }
        }

        function requestNewLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (p) => {
                        const lat = p.coords.latitude;
                        const lon = p.coords.longitude;
                        localStorage.setItem('aba_malik_lat', lat);
                        localStorage.setItem('aba_malik_lon', lon);
                        await getLivePrayers(lat, lon);
                    },
                    async () => {
                        await getLivePrayers(30.0444, 31.2357);
                    }
                );
            }
        }

        async function getLivePrayers(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                timings = data.data.timings;
                renderUI(data.data);
                startEngine();
            } catch (e) { console.error("Error"); }
        }

        function renderUI(data) {
            const grid = document.getElementById('prayerGrid');
            const pList = [
                {n:'الفجر', t:timings.Fajr, id:'Fajr'}, {n:'الشروق', t:timings.Sunrise, id:'Sunrise'},
                {n:'الظهر', t:timings.Dhuhr, id:'Dhuhr'}, {n:'العصر', t:timings.Asr, id:'Asr'},
                {n:'المغرب', t:timings.Maghrib, id:'Maghrib'}, {n:'العشاء', t:timings.Isha, id:'Isha'}
            ];
            grid.innerHTML = pList.map(p => `
                <div id="card-${p.id}" class="prayer-card p-4 text-center shadow-md animate__animated animate__fadeInUp">
                    <p class="text-[10px] font-bold text-emerald-600 mb-1">${p.n}</p>
                    <p class="font-black text-lg">${p.t.substring(0,5)}</p>
                </div>
            `).join('');
            document.getElementById('hDate').innerText = `${data.date.hijri.day} ${data.date.hijri.month.ar} ${data.date.hijri.year}`;
            document.getElementById('gDate').innerText = data.date.gregorian.date;
        }

        function startEngine() {
            let lastUpdate = 0;
            setInterval(() => {
                const now = new Date();
                const prayers = [
                    {n:'الفجر', t:timings.Fajr, id:'Fajr'}, {n:'الظهر', t:timings.Dhuhr, id:'Dhuhr'},
                    {n:'العصر', t:timings.Asr, id:'Asr'}, {n:'المغرب', t:timings.Maghrib, id:'Maghrib'},
                    {n:'العشاء', t:timings.Isha, id:'Isha'}
                ];
                let next = null;
                prayers.forEach((p) => {
                    const [h, m] = p.t.split(':');
                    const d = new Date(); d.setHours(h, m, 0);
                    if (d > now && !next) next = { ...p, d };
                });
                if (!next) {
                    const [h, m] = prayers[0].t.split(':');
                    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(h, m, 0);
                    next = { ...prayers[0], d };
                }

                const diff = next.d - now;
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);

                const timeStr = `${String(hrs).padStart(2,'0')} : ${String(mins).padStart(2,'0')} : ${String(secs).padStart(2,'0')}`;
                document.getElementById('countdownTimer').innerText = timeStr;
                document.getElementById('nextPrayerLabel').innerText = `باقي على صلاة ${next.n}`;
                document.getElementById('currentTime').innerText = now.toLocaleTimeString('ar-EG');

                // تحديث الإشعار كل دقيقة لضمان عدم استهلاك البطارية
                if (notificationEnabled && now.getTime() - lastUpdate > 60000) {
                    updateNotification(next.n, `${hrs}س و ${mins}د`);
                    lastUpdate = now.getTime();
                }
            }, 1000);
        }

        async function updateNotification(name, remain) {
            if ('serviceWorker' in navigator && notificationEnabled) {
                const reg = await navigator.serviceWorker.ready;
                reg.showNotification("موعد الصلاة القادمة", {
                    body: `صلاة ${name} بعد ${remain}`,
                    icon: "https://i.ibb.co/pBhzxHdM/1000027317.jpg",
                    badge: "https://i.ibb.co/pBhzxHdM/1000027317.jpg",
                    tag: "prayer-timer",
                    renotify: false,
                    silent: true,
                    actions: [{ action: "close", title: "إزالة الإشعار" }]
                });
            }
        }

        initApp();
    </script>
</body>
    </html>
