<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبا مالك العقيلي | التطبيق الشامل</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://i.ibb.co/pBhzxHdM/1000027317.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; transition: background-color 0.5s ease, color 0.5s ease; }
        .glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 40px; transition: all 0.5s ease; }
        .bg-image { background-image: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; background-attachment: fixed; transition: background 0.5s ease; }
        
        body.light-mode { background-color: #f0f2f5; color: #1a1a1a; }
        body.light-mode .bg-image { background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); }
        body.light-mode .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.1); color: #1a1a1a; }
        
        .dollar-btn { background-color: #22c55e; color: #fff; }
        .gold-btn { background-color: #f1d592; color: #000; }
        .mosque-btn { background: linear-gradient(90deg, #064e3b, #065f46); color: #fff; }
        .games-btn { background: linear-gradient(to r, #064e3b, #065f46); border: 1px solid #10b981; color: white; }
        .gallery-btn { background: linear-gradient(to r, #78350f, #b45309); border: 1px solid #d97706; color: white; }
        .wisdom-btn { background: linear-gradient(to r, #4c1d95, #312e81); border: 1px solid #a78bfa; color: white; }
        .install-btn { background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; display: none; }
        .theme-toggle { position: fixed; top: 20px; left: 20px; z-index: 100; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-black text-white min-h-screen bg-image flex flex-col items-center">

    <button id="themeToggle" class="theme-toggle glass">
        <i id="themeIcon" class="fas fa-sun text-yellow-400 text-xl"></i>
    </button>

    <div class="fixed inset-0 bg-black/30 z-0"></div>

    <nav class="p-6 relative z-50 text-center">
        <h1 class="text-2xl font-black tracking-widest uppercase animate__animated animate__fadeInDown">ABA MALIK AL-AQILI</h1>
    </nav>

    <div class="relative z-10 container mx-auto px-6 py-4 flex flex-col items-center flex-grow">
        <div class="glass p-8 w-full max-w-md text-center shadow-2xl mb-12 animate__animated animate__zoomIn">
            <h2 class="text-5xl font-black mb-1">أبا مالك</h2>
            <h3 class="text-2xl font-bold text-blue-400 mb-8">العقيلي</h3>
            
            <div class="flex flex-col gap-5 mb-8">
                <a href="prayer.html" class="mosque-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95 border border-emerald-400/30">
                    <span>ركن المسجد والمواقيت</span>
                    <i class="fas fa-mosque text-yellow-400 text-xl"></i>
                </a>
                <a href="azkar.html" class="bg-emerald-900/80 border border-emerald-500/30 w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95 text-white">
                    <span>موسوعة أذكار أبا مالك</span>
                    <i class="fas fa-book-reader text-yellow-400 text-xl"></i>
                </a>
                <a href="gallery.html" class="gallery-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95 border border-orange-400/30">
                    <span>معرض الأعمال الإبداعية</span>
                    <i class="fas fa-microchip text-yellow-500 text-xl"></i>
                </a>
                <button onclick="showWisdom()" class="wisdom-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95">
                    <span>حكمة اليوم</span>
                    <i class="fas fa-lightbulb text-yellow-400 text-xl"></i>
                </button>
            </div>
            
            <div class="grid grid-cols-1 gap-4 mb-8">
                <a href="https://www.google.com/search?q=سعر+الدولار+اليوم+في+مصر" target="_blank" rel="noopener" class="dollar-btn flex items-center justify-between px-6 py-4 rounded-full font-bold text-xs shadow-md transition active:scale-95">
                    <span>سعر الدولار اليوم</span>
                    <i class="fas fa-dollar-sign"></i>
                </a>
                <a href="https://www.gold-price-today.com/egypt/" target="_blank" rel="noopener" class="gold-btn flex items-center justify-between px-6 py-4 rounded-full font-bold text-xs shadow-md transition active:scale-95">
                    <span>أسعار الذهب الآن</span>
                    <i class="fas fa-coins"></i>
                </a>
            </div>

            <div class="mb-8">
                <a href="games.html" class="games-btn w-full flex items-center justify-center gap-3 py-5 rounded-2xl font-bold text-sm shadow-xl transition active:scale-95">
                    <i class="fas fa-chess-rook text-xl"></i> دخول مملكة صلاح الدين
                </a>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <a href="https://wa.me/201113412908" target="_blank" rel="noopener" class="bg-[#2ecc71] flex items-center justify-center gap-2 py-4 rounded-2xl font-bold text-xs shadow-md transition active:scale-95 text-white">
                    <i class="fab fa-whatsapp"></i> واتساب
                </a>
                <a href="tel:+201113412908" class="bg-white text-black flex items-center justify-center gap-2 py-4 rounded-2xl font-bold text-xs shadow-md transition active:scale-95">
                    <i class="fas fa-phone-alt"></i> اتصال
                </a>
            </div>

            <div class="flex flex-col items-center gap-4 py-6 border-t border-white/10 mt-4">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">شارك التطبيق مع أحبابك</p>
                <div class="flex gap-4">
                    <button onclick="shareToWhatsApp()" class="bg-green-600 hover:bg-green-500 p-4 rounded-full shadow-lg transition active:scale-90 flex items-center justify-center w-14 h-14">
                        <i class="fab fa-whatsapp text-2xl text-white"></i>
                    </button>
                    <button onclick="copySiteLink()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-full shadow-lg transition active:scale-90 flex items-center justify-center w-14 h-14">
                        <i class="fas fa-link text-2xl text-white"></i>
                    </button>
                </div>
            </div>

            <button id="installBtn" class="install-btn w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold text-sm shadow-xl mb-6 transition active:scale-95">
                <i class="fas fa-download"></i> تثبيت التطبيق
            </button>

            <a href="https://www.facebook.com/share/1NhmGTxvxJ/" target="_blank" rel="noopener" class="fb-btn w-full flex items-center justify-center gap-2 py-4 rounded-2xl font-bold text-sm shadow-lg transition active:scale-95 text-white bg-blue-600">
                <i class="fab fa-facebook-f"></i> حساب فيسبوك
            </a>
        </div>
    </div>

    <footer class="relative z-10 w-full text-center pb-8 animate__animated animate__fadeIn">
        <div class="glass inline-block px-6 py-2">
            <p class="text-[10px] md:text-xs text-gray-300 font-bold tracking-widest leading-relaxed">
                جميع الحقوق محفوظة © ٢٠٢٦ | صُمم بواسطة 
                <span class="text-blue-400">عبد العزيز حسين عبد العزيز علي</span>
            </p>
        </div>
    </footer>

    <script>
        const siteUrl = "https://adpalzez.github.io/my-web-portfolio/"; 
        const shareText = "السلام عليكم، أدعوك لزيارة تطبيق أبا مالك العقيلي: ";

        // قائمة الحِكم المحدثة
        const wisdoms = [
            "من استشار، شارك الناس في عقولهم.",
            "العدل أساس الملك.",
            "القائد الناجح هو من يصنع قادة، لا أتباعاً.",
            "العلم في الصغر كالنقش في الحجر."
        ];

        function showWisdom() {
            const randomIndex = Math.floor(Math.random() * wisdoms.length);
            alert("حكمة القائد: " + wisdoms[randomIndex]);
        }

        function shareToWhatsApp() {
            window.open(`https://wa.me/?text=${encodeURIComponent(shareText + siteUrl)}`, '_blank');
        }

        function copySiteLink() {
            navigator.clipboard.writeText(siteUrl).then(() => {
                alert("تم نسخ رابط الموقع بنجاح!");
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'flex';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
        });

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;
        if (localStorage.getItem('theme') === 'light') enableLightMode();
        themeToggle.addEventListener('click', () => {
            body.classList.contains('light-mode') ? disableLightMode() : enableLightMode();
        });
        function enableLightMode() {
            body.classList.add('light-mode');
            themeIcon.classList.replace('fa-sun', 'fa-moon'); themeIcon.classList.replace('text-yellow-400', 'text-gray-600');
            localStorage.setItem('theme', 'light');
        }
        function disableLightMode() {
            body.classList.remove('light-mode');
            themeIcon.classList.replace('fa-moon', 'fa-sun'); themeIcon.classList.replace('text-gray-600', 'text-yellow-400');
            localStorage.setItem('theme', 'dark');
        }
    </script>
</body>
        </html>
