<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أذكار أبا مالك - الموسوعة الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0a0a0a; --bg-card: #161616; --gold: #fbbf24; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: #e5e7eb; scroll-behavior: smooth; }
        .world-header { background: linear-gradient(180deg, #10b981 0%, #059669 100%); border-radius: 0 0 40px 40px; padding: 25px 20px 50px 20px; }
        .date-box { background: rgba(255, 255, 255, 0.15); border-radius: 15px; padding: 10px; backdrop-filter: blur(5px); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .category-card { border-radius: 24px; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .zkr-card { transition: 0.4s; position: relative; overflow: hidden; background: var(--bg-card); border: 1px solid #252525; }
        .progress-bar { height: 6px; background: linear-gradient(90deg, #fbbf24, #f59e0b); transition: width 0.3s; border-radius: 10px; }
        .done-overlay { position: absolute; inset: 0; background: rgba(16, 185, 129, 0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; animation: zoomIn 0.5s; border-radius: 30px; }
        .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 450px; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; z-index: 100; }
        .total-counter { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
    </style>
</head>
<body class="pb-32" onload="updateDateTime()">

    <div class="max-w-[450px] mx-auto min-h-screen">
        <header class="world-header text-white mb-8">
            <div class="flex justify-between items-center mb-6">
                <button onclick="location.href='index.html'" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i class="fas fa-arrow-right"></i></button>
                <div class="text-center">
                    <h1 class="text-xl font-black">أذكار أبا مالك</h1>
                    <p class="text-[9px] opacity-70 tracking-widest uppercase">The Holy Fortress</p>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="date-box flex justify-between items-center text-center text-xs">
                <div class="flex-1 text-right pr-2">
                    <p class="opacity-70 mb-1">الميلادي</p>
                    <p id="gDate" class="font-bold"></p>
                </div>
                <div class="h-8 w-[1px] bg-white/20"></div>
                <div class="flex-1 text-left pl-2">
                    <p class="opacity-70 mb-1">الهجري</p>
                    <p id="hDate" class="font-bold"></p>
                </div>
            </div>
        </header>

        <main class="px-5">
            <div class="total-counter rounded-3xl p-5 flex justify-between items-center mb-8 animate__animated animate__fadeIn">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black shadow-lg">
                        <i class="fas fa-fingerprint text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-yellow-500 font-bold uppercase">إجمالي التسبيح</p>
                        <p id="totalClicks" class="text-3xl font-black font-mono">0000</p>
                    </div>
                </div>
                <button onclick="resetTotal()" class="w-10 h-10 glass rounded-xl text-xs text-gray-400"><i class="fas fa-redo"></i></button>
            </div>

            <div id="mainGrid" class="grid grid-cols-2 gap-4">
                <div onclick="renderSection('morning')" class="category-card bg-orange-500/10 text-orange-500">
                    <i class="fas fa-sun text-3xl"></i><span class="font-black text-sm">ورد الصباح</span>
                </div>
                <div onclick="renderSection('evening')" class="category-card bg-purple-500/10 text-purple-600">
                    <i class="fas fa-moon text-3xl"></i><span class="font-black text-sm">ورد المساء</span>
                </div>
                <div onclick="renderSection('sleep')" class="category-card bg-blue-500/10 text-blue-500">
                    <i class="fas fa-bed text-3xl"></i><span class="font-black text-sm">أذكار النوم</span>
                </div>
                <div onclick="renderSection('hadith')" class="category-card bg-rose-500/10 text-rose-500">
                    <i class="fas fa-heart text-3xl"></i><span class="font-black text-sm">أحاديث نبوية</span>
                </div>
            </div>

            <div id="listView" class="hidden space-y-4">
                <div id="listItems"></div>
                <button onclick="closeList()" class="w-full py-5 bg-emerald-600 text-white rounded-[25px] font-black shadow-xl mt-4">العودة للرئيسية</button>
            </div>
        </main>

        <nav class="nav-bottom">
            <i class="fas fa-home text-emerald-500 text-xl cursor-pointer" onclick="closeList()"></i>
            <i class="fas fa-book-open text-gray-600 cursor-pointer" onclick="renderSection('morning')"></i>
            <i class="fas fa-cog text-gray-600 cursor-pointer"></i>
        </nav>
    </div>

   
    <script>
        const AZKAR_DB = {
            morning: [
                {t: "آية الكرسي: «اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلا نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ».", c: 1},

                {t: "سورة الفلق: «قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِن شَرِّ مَا خَلَقَ * وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ».", c: 3},

              {t: "«حَسْبِـيَ اللّهُ لا إلهَ إلّا هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم..", c: 7},
                {t: "«لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ».", c: 100}

            {t: "سورة الفلق: «قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِن شَرِّ مَا خَلَقَ * وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ».", c: 3},

     {t: "«أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ، وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ».", c: 1},
     {t: "سيد الاستغفار: «اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ».", c: 1},

        function updateDateTime() {
            const now = new Date();
            document.getElementById('gDate').innerText = now.toLocaleDateString('ar-EG');
            document.getElementById('hDate').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {day:'numeric', month:'long'}).format(now);
            document.getElementById('totalClicks').innerText = totalClicks.toString().padStart(4, '0');
        }

        function renderSection(type) {
            document.getElementById('mainGrid').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden');
            const container = document.getElementById('listItems');
            container.innerHTML = '';
            
            AZKAR_DB[type].forEach((item, index) => {
                container.innerHTML += `
                    <div id="zkr-${index}" onclick="doCount(${index}, ${item.c}, '${type}')" class="zkr-card p-6 rounded-[30px] mb-4 shadow-lg">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">تكرار: ${item.c}</span>
                            <span id="count-${index}" class="text-2xl font-black font-mono text-white">${item.c}</span>
                        </div>
                        <p class="text-lg font-bold text-right leading-relaxed mb-4">${item.t}</p>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div id="bar-${index}" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                `;
            });
            window.scrollTo(0,0);
        }

        function doCount(index, max, type) {
            const countElem = document.getElementById(`count-${index}`);
            const barElem = document.getElementById(`bar-${index}`);
            const cardElem = document.getElementById(`zkr-${index}`);
            let current = parseInt(countElem.innerText);

            if(current > 0) {
                current--;
                totalClicks++;
                countElem.innerText = current;
                localStorage.setItem('totalAzkarClicks', totalClicks);
                document.getElementById('totalClicks').innerText = totalClicks.toString().padStart(4, '0');
                
                let progress = ((max - current) / max) * 100;
                barElem.style.width = progress + '%';
                
                if(navigator.vibrate) navigator.vibrate(40);

                if(current === 0) {
                    cardElem.innerHTML += `<div class="done-overlay animate__animated animate__zoomIn"><i class="fas fa-check-circle text-4xl mb-2"></i><span class="font-black">${AZKAR_DB[type][index].m}</span></div>`;
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            }
        }

        function closeList() {
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('mainGrid').classList.remove('hidden');
        }

        function resetTotal() {
            if(confirm("هل تريد تصفير العداد الإجمالي؟")) {
                totalClicks = 0;
                localStorage.setItem('totalAzkarClicks', 0);
                document.getElementById('totalClicks').innerText = "0000";
            }
        }
    </script>
</body>
                        </html>
