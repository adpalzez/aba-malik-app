<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبا مالك العقيلي | 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://i.ibb.co/pBhzxHdM/1000027317.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.5s; background-attachment: fixed; overflow-x: hidden; }
        .glass { background: rgba(0,0,0,0.65); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; }
        .bg-image { background-image: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; }
        
        .mood-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; padding: 5px 15px; }
        
        .nav-bottom { background: rgba(0,0,0,0.85); backdrop-filter: blur(30px); padding: 15px; display: flex; justify-content: space-around; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .nav-item { color: rgba(255,255,255,0.4); font-size: 1.2rem; transition: 0.4s; }
        .nav-item.active { color: #fbbf24; transform: translateY(-5px); text-shadow: 0 0 15px #fbbf24; }

        .btn-premium { transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-premium:active { transform: scale(0.92); }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body class="bg-black text-white min-h-screen bg-image flex flex-col items-center p-4 pb-48">

    <header class="w-full max-w-md flex flex-col gap-4 mb-8 mt-2 z-[1001] sticky top-2">
        <div class="flex justify-between items-center px-1">
            <button id="themeToggle" class="glass w-10 h-10 flex items-center justify-center border border-white/10 active:scale-90 transition">
                <i id="themeIcon" class="fas fa-moon text-yellow-400"></i>
            </button>

            <div class="prayer-bar flex items-center gap-3 px-4 py-2 bg-white/5 rounded-full border border-white/10">
                <span id="nextPrayerName" class="text-[9px] font-black text-yellow-500 uppercase">الصلاة</span>
                <span id="prayerTimer" class="text-xs font-mono font-black">00:00:00</span>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="shareKingdom()" class="glass w-10 h-10 flex items-center justify-center border border-white/10 text-blue-400 active:scale-90 transition">
                    <i class="fas fa-share-alt"></i>
                </button>
                <div class="points-badge px-4 py-1.5 rounded-full flex items-center gap-2 bg-gradient-to-r from-yellow-500 to-orange-600 shadow-lg">
                    <i class="fas fa-star text-[10px]"></i>
                    <span class="text-xs font-black" id="userPoints">0</span>
                </div>
            </div>
        </div>

        <div class="mood-bar flex justify-between items-center animate__animated animate__fadeInDown relative overflow-hidden">
            <div class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full border border-white/10 shadow-inner">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-tighter">أبا مالك العقيلي</span>
            </div>

            <div class="flex gap-4">
                <button onclick="window.setMood('happy')" class="text-lg hover:scale-125 transition">😊</button>
                <button onclick="window.setMood('grateful')" class="text-lg hover:scale-125 transition">🤲</button>
                <button onclick="window.setMood('anxious')" class="text-lg hover:scale-125 transition">😟</button>
                <button onclick="window.setMood('tired')" class="text-lg hover:scale-125 transition">😴</button>
            </div>
        </div>
    </header>

    <main class="glass w-full max-w-md p-8 text-center mb-6 border border-white/5 animate__animated animate__zoomIn">
        <h2 class="text-4xl font-black mb-1 tracking-tighter uppercase">أبا مالك العقيلي</h2>
        <p class="text-blue-400 text-[9px] font-bold tracking-[0.4em] uppercase mb-10 opacity-80">الإصدار النخبوي 2026</p>

        <button id="installApp" class="hidden w-full bg-white/10 border border-dashed border-white/30 py-4 rounded-[25px] mb-6 flex items-center justify-center gap-2 animate__animated animate__pulse animate__infinite">
            <i class="fas fa-download text-blue-400"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">تثبيت التطبيق على هاتفك</span>
        </button>

        <div class="menu-grid mb-8">
            <a href="prayer.html" class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-500 btn-premium p-6 rounded-[35px] shadow-lg">
                <i class="fas fa-mosque text-2xl"></i>
                <span class="text-[9px] font-black uppercase">ركن المسجد</span>
            </a>
            <a href="azkar.html" class="bg-blue-500/10 border border-blue-500/30 text-blue-400 btn-premium p-6 rounded-[35px] shadow-lg">
                <i class="fas fa-book-open text-2xl"></i>
                <span class="text-[9px] font-black uppercase">الأذكار</span>
            </a>
            <button onclick="window.showRandomWisdom()" class="bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 btn-premium p-6 rounded-[35px] shadow-lg">
                <i class="fas fa-lightbulb text-2xl"></i>
                <span class="text-[9px] font-black uppercase">الحكمة</span>
            </button>
            <button onclick="window.openRating()" class="bg-rose-500/10 border border-rose-500/30 text-rose-400 btn-premium p-6 rounded-[35px] shadow-lg">
                <i class="fas fa-star text-2xl"></i>
                <span class="text-[9px] font-black uppercase">التقييم</span>
            </button>
            <a href="games.html" class="full-width bg-gradient-to-r from-emerald-900 to-green-600 py-6 rounded-[35px] flex items-center justify-center gap-4 border border-white/10 shadow-2xl active:scale-95 transition">
                <i class="fas fa-chess-rook text-2xl text-yellow-400"></i>
                <span class="text-xs font-black text-white uppercase tracking-widest text-[10px]">مملكة صلاح الدين</span>
            </a>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[2000] flex flex-col items-center pb-6">
        <div class="mb-3 px-4 py-1 rounded-full bg-white/5 backdrop-blur-md border border-white/10 animate__animated animate__fadeIn">
            <span class="text-[9px] font-black text-white/40 uppercase tracking-[0.3em]">ABA MALIK APP</span>
        </div>

        <nav class="nav-bottom w-[92%] max-w-md mx-auto">
            <a href="index.html" class="nav-item active"><i class="fas fa-home"></i></a>
            <a href="prayer.html" class="nav-item"><i class="fas fa-mosque"></i></a>
            <a href="posts.html" class="nav-item"><i class="fas fa-paper-plane"></i></a>
            <a href="azkar.html" class="nav-item"><i class="fas fa-book-open"></i></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
        </nav>
    </div>

    <div id="wisdomModal" class="fixed inset-0 z-[3000] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="glass p-10 max-w-sm w-full text-center border-2 border-yellow-500/30">
            <i class="fas fa-quote-right text-yellow-500 text-5xl mb-6"></i>
            <div id="wisdomText" class="text-lg font-bold leading-relaxed mb-8 text-white"></div>
            <button onclick="window.closeWisdom()" class="w-full py-4 bg-yellow-600 rounded-full font-black text-white shadow-xl active:scale-95 transition">آمنت بالله</button>
        </div>
    </div>

    <script>
        window.shareKingdom = function() {
            if (navigator.share) {
                navigator.share({
                    title: 'أبا مالك العقيلي | 2026',
                    text: 'انضم إلي في التطبيق النخبوي، واجمع نقاط الأثر!',
                    url: window.location.href
                }).then(() => { if(window.addPoints) window.addPoints(20); })
                .catch((error) => console.log('خطأ في المشاركة', error));
            } else {
                alert("انسخ الرابط وشاركه: " + window.location.href);
            }
        };
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="app.js?v=6.1"></script>
</body>
            </html>
