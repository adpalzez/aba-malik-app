<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركات أبا مالك العقيلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .post-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .interaction-btn { color: #94a3b8; transition: all 0.2s; font-size: 0.85rem; padding: 8px 15px; border-radius: 99px; }
        .interaction-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .comment-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0f172a] sticky top-0 z-50">
        <h1 class="text-xl font-black text-red-500">ABA MALIK POSTS</h1>
        <span class="text-xs bg-red-600 px-2 py-1 rounded">LIVE</span>
    </header>

    <div class="container mx-auto px-4 py-6 max-w-md">
        <div class="post-card p-4 border-2 border-red-500/20">
            <textarea id="postText" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-red-500" placeholder="بماذا تفكر يا أبا مالك؟"></textarea>
            
            <div id="previewArea" class="hidden mt-3 rounded-xl overflow-hidden border border-red-500/30">
                <img id="imagePreview" class="hidden w-full h-48 object-cover">
                <video id="videoPreview" controls class="hidden w-full h-48 bg-black"></video>
            </div>

            <div class="flex justify-between items-center mt-4">
                <div class="flex gap-4 text-gray-400">
                    <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-camera text-xl"></i></button>
                    <button onclick="document.getElementById('videoInput').click()"><i class="fas fa-video text-xl"></i></button>
                </div>
                <button id="uploadBtn" onclick="publishPost()" class="bg-red-600 px-6 py-2 rounded-full font-bold shadow-lg active:scale-95 transition">نشر</button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <input type="file" id="videoInput" class="hidden" accept="video/*">
        </div>

        <div id="dynamicPosts"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات مشروعك يا أبا مالك
        const firebaseConfig = {
          apiKey: "AIzaSyDOk3e9s7suX4eR7kviyo31ZkEU_25AuJQ",
          authDomain: "planning-with-ai-8d3e9.firebaseapp.com",
          projectId: "planning-with-ai-8d3e9",
          storageBucket: "planning-with-ai-8d3e9.appspot.com",
          messagingSenderId: "872108863700",
          appId: "1:872108863700:web:7b2612a11bfa185b21cb41"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        // معاينة الملفات قبل الرفع
        function handlePreview(input, isVideo) {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('previewArea').classList.remove('hidden');
                if (isVideo) {
                    document.getElementById('videoPreview').src = url;
                    document.getElementById('videoPreview').classList.remove('hidden');
                    document.getElementById('imagePreview').classList.add('hidden');
                } else {
                    document.getElementById('imagePreview').src = url;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('videoPreview').classList.add('hidden');
                }
            }
        }
        document.getElementById('fileInput').onchange = (e) => handlePreview(e.target, false);
        document.getElementById('videoInput').onchange = (e) => handlePreview(e.target, true);

        // رفع المنشور
        async function publishPost() {
            const text = document.getElementById('postText').value;
            const fileInput = document.getElementById('fileInput').files[0] || document.getElementById('videoInput').files[0];
            const btn = document.getElementById('uploadBtn');

            if (!text && !fileInput) return alert("اكتب شيئاً أو اختر ملفاً");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                let fileUrl = null;
                let fileType = 'text';

                if (fileInput) {
                    const ref = storage.ref(`posts/${Date.now()}_${fileInput.name}`);
                    await ref.put(fileInput);
                    fileUrl = await ref.getDownloadURL();
                    fileType = fileInput.type.includes('video') ? 'video' : 'image';
                }

                await db.collection("all_posts").add({
                    content: text,
                    url: fileUrl,
                    type: fileType,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likesCount: 0
                });

                document.getElementById('postText').value = "";
                document.getElementById('previewArea').classList.add('hidden');
                alert("تم النشر بنجاح!");
            } catch (err) {
                alert("خطأ: تأكد من فتح Rules في Firebase");
            } finally {
                btn.innerHTML = "نشر";
                btn.disabled = false;
            }
        }

        // عرض المنشورات لحظياً
        db.collection("all_posts").orderBy("timestamp", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const post = doc.data();
                const postId = doc.id;
                html += `
                    <div class="post-card animate__animated animate__fadeInUp">
                        <div class="p-4 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center font-bold">A</div>
                                <span class="text-sm font-bold">أبا مالك</span>
                            </div>
                            <button onclick="deletePost('${postId}', '${post.url}')" class="text-gray-500 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="px-4 pb-3 text-sm">${post.content || ''}</div>
                        ${post.url ? (post.type === 'video' ? `<video src="${post.url}" controls class="w-full"></video>` : `<img src="${post.url}" class="w-full">`) : ''}
                        <div class="p-2 border-t border-white/5 flex gap-4">
                            <button onclick="likePost('${postId}')" class="interaction-btn"><i class="far fa-heart"></i> ${post.likesCount || 0}</button>
                        </div>
                    </div>`;
            });
            document.getElementById('dynamicPosts').innerHTML = html;
        });

        // حذف المنشور
        async function deletePost(id, url) {
            if (confirm("هل تريد حذف هذا المنشور؟")) {
                await db.collection("all_posts").doc(id).delete();
                if (url) {
                    try { await storage.refFromURL(url).delete(); } catch(e) {}
                }
            }
        }

        // إعجاب
        async function likePost(id) {
            await db.collection("all_posts").doc(id).update({ likesCount: firebase.firestore.FieldValue.increment(1) });
        }
    </script>
</body>
        </html>
