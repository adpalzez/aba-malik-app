<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبا مالك العقيلي | التطبيق الشامل</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://i.ibb.co/pBhzxHdM/1000027317.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; transition: background-color 0.5s ease, color 0.5s ease; }
        .glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 40px; transition: all 0.5s ease; }
        .bg-image { background-image: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        
        body.light-mode { background-color: #f0f2f5; color: #1a1a1a; }
        body.light-mode .bg-image { background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); }
        body.light-mode .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.1); color: #1a1a1a; }
        
        .mosque-btn { background: linear-gradient(90deg, #166534, #15803d); border: 1px solid #16a34a; color: white; }
        .azkar-btn { background: linear-gradient(90deg, #1e3a8a, #1d4ed8); border: 1px solid #2563eb; color: white; }
        .gallery-btn { background: linear-gradient(90deg, #b45309, #d97706); border: 1px solid #f97316; color: white; }
        .wisdom-btn { background: linear-gradient(90deg, #581c87, #6d28d9); border: 1px solid #8b5cf6; color: white; }
        .dollar-btn { background: linear-gradient(90deg, #15803d, #166534); border: 1px solid #22c55e; color: white; }
        .gold-btn { background: linear-gradient(90deg, #b59410, #d9b11e); border: 1px solid #eab308; color: #000; }
        .games-btn { background: linear-gradient(to r, #064e3b, #065f46); border: 1px solid #10b981; color: white; }
        
        .theme-toggle { position: fixed; top: 20px; left: 20px; z-index: 100; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* زر التثبيت في أسفل اليمين */
        #installBtn { position: fixed; bottom: 30px; right: 20px; z-index: 1000; display: none; }
    </style>
</head>
<body class="bg-black text-white min-h-screen bg-image flex flex-col items-center">

    <button id="themeToggle" class="theme-toggle glass">
        <i id="themeIcon" class="fas fa-sun text-yellow-400 text-xl"></i>
    </button>

    <button id="installBtn" class="glass p-4 rounded-full shadow-2xl animate__animated animate__bounceIn">
        <i class="fas fa-download text-yellow-400 text-xl"></i>
    </button>

    <div class="fixed inset-0 bg-black/30 z-0"></div>

    <nav class="p-6 relative z-50 text-center">
        <h1 class="text-2xl font-black tracking-widest uppercase animate__animated animate__fadeInDown">ABA MALIK AL-AQILI</h1>
    </nav>

    <div class="relative z-10 container mx-auto px-6 py-4 flex flex-col items-center flex-grow">
        <div class="glass p-8 w-full max-w-md text-center shadow-2xl mb-12 animate__animated animate__zoomIn">
            <h2 class="text-5xl font-black mb-1">أبا مالك</h2>
            <h3 class="text-2xl font-bold text-blue-400 mb-8">العقيلي</h3>
            
            <div class="flex flex-col gap-5 mb-8">
                <a href="prayer.html" class="mosque-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95">
                    <span>ركن المسجد والمواقيت</span><i class="fas fa-mosque text-yellow-400 text-xl"></i>
                </a>
                <a href="azkar.html" class="azkar-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95">
                    <span>موسوعة أذكار أبا مالك</span><i class="fas fa-book-reader text-yellow-400 text-xl"></i>
                </a>
                <a href="gallery.html" class="gallery-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95">
                    <span>معرض الأعمال الإبداعية</span><i class="fas fa-microchip text-yellow-500 text-xl"></i>
                </a>
                <button onclick="showWisdom()" class="wisdom-btn w-full flex items-center justify-between px-6 py-4 rounded-full font-bold text-sm shadow-lg transition active:scale-95">
                    <span>حكمة اليوم</span><i class="fas fa-lightbulb text-yellow-400 text-xl"></i>
                </button>
            </div>
            
            <div class="grid grid-cols-1 gap-4 mb-8">
                <a href="https://www.google.com/search?q=سعر+الدولار+اليوم+في+مصر" target="_blank" class="dollar-btn flex items-center justify-between px-6 py-4 rounded-full font-bold text-xs shadow-md">
                    <span>سعر الدولار اليوم</span><i class="fas fa-dollar-sign"></i>
                </a>
                <a href="https://www.gold-price-today.com/egypt/" target="_blank" class="gold-btn flex items-center justify-between px-6 py-4 rounded-full font-bold text-xs shadow-md">
                    <span>أسعار الذهب الآن</span><i class="fas fa-coins"></i>
                </a>
            </div>

            <div class="mb-8">
                <a href="games.html" class="games-btn w-full flex items-center justify-center gap-3 py-5 rounded-2xl font-bold text-sm shadow-xl transition active:scale-95">
                    <i class="fas fa-chess-rook text-xl"></i> دخول مملكة صلاح الدين
                </a>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="https://wa.me/201113412908" target="_blank" class="bg-[#2ecc71] flex items-center justify-center gap-2 py-4 rounded-2xl font-bold text-xs shadow-md text-white">
                    <i class="fab fa-whatsapp"></i> واتساب
                </a>
                <a href="tel:+201113412908" class="bg-white text-black flex items-center justify-center gap-2 py-4 rounded-2xl font-bold text-xs shadow-md">
                    <i class="fas fa-phone-alt"></i> اتصال
                </a>
            </div>
        </div>
    </div>

    <div id="wisdomModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass p-8 max-w-sm w-full text-center border-2 border-yellow-500/50 relative">
            <button onclick="closeWisdom()" class="absolute top-4 left-4 text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            <i class="fas fa-quote-right text-yellow-500 text-3xl mb-4"></i>
            <div id="wisdomText" class="text-2xl font-black leading-relaxed text-white mb-6"></div>
            <button onclick="closeWisdom()" class="bg-yellow-600 text-black px-8 py-2 rounded-full font-bold text-sm shadow-lg">اعتززت بهذه الحكمة</button>
        </div>
    </div>

    <footer class="relative z-10 w-full text-center pb-8">
        <div class="glass inline-block px-6 py-2">
            <p class="text-[10px] text-gray-300 font-bold tracking-widest">
                جميع الحقوق محفوظة © ٢٠٢٦ | صُمم بواسطة <span class="text-blue-400">عبد العزيز حسين عبد العزيز علي</span>
            </p>
        </div>
    </footer>

    <script>
        const subWisdoms = ["من استشار، شارك الناس في عقولهم.", "العدل أساس الملك.", "القائد الناجح هو من يصنع قادة، لا أتباعاً."];
        const mainWisdom = "كُنْ مَاهِراً لِيَحْتَاجَكَ النَّاس، وَكُنْ هَيِّناً لِيُحِبَّكَ النَّاس.";

        function showWisdom() {
            const modal = document.getElementById('wisdomModal');
            const textZone = document.getElementById('wisdomText');
            textZone.innerHTML = Math.random() > 0.3 ? mainWisdom : subWisdoms[Math.floor(Math.random() * subWisdoms.length)];
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }
        function closeWisdom() { document.getElementById('wisdomModal').classList.add('hidden'); }

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-sun'); icon.classList.toggle('fa-moon');
        });
    </script>
    
    <script src="install.js"></script>
</body>
                </html>
