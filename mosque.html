<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ركن المسجد | أبا مالك العقيلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-teal: #064e3b; --accent-gold: #fbbf24; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; color: #1e293b; touch-action: manipulation; }
        .hero-section { background: linear-gradient(rgba(6, 78, 59, 0.85), rgba(6, 78, 59, 0.95)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; border-radius: 0 0 45px 45px; color: white; }
        .prayer-card { background: white; border-radius: 20px; transition: 0.3s; border: 1px solid #e2e8f0; min-width: 100px; flex-shrink: 0; }
        .prayer-card.active { border: 2px solid var(--accent-gold); background: #f0fdf4; }
        .settings-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 40px 40px 0 0; transform: translateY(100%); transition: 0.5s; z-index: 3000; }
        .settings-panel.active { transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <section class="hero-section p-6 text-center shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="w-9 h-9 rounded-full border-2 border-yellow-500 shadow-lg">
                <span class="text-xs font-black">أبا مالك العقيلي</span>
            </div>
            <i onclick="toggleSettings()" class="fas fa-cog text-2xl text-white/70 cursor-pointer"></i>
        </div>

        <div class="py-10">
            <p id="nextPrayerTitle" class="text-yellow-400 font-black mb-2 animate__animated animate__pulse animate__infinite">جاري جلب البيانات...</p>
            <h2 id="mainCountdown" class="text-6xl font-black mb-6 tracking-tighter">00:00:00</h2>
            <p id="locationStatus" class="text-[10px] opacity-60 font-bold tracking-widest uppercase"></p>
        </div>

        <div class="flex justify-between items-center text-[11px] bg-black/30 p-4 rounded-[25px]">
            <div class="text-right leading-tight"><p class="opacity-50">التاريخ الهجري</p><p id="hijriDate" class="font-black text-yellow-500 text-sm"></p></div>
            <div class="text-left leading-tight"><p class="opacity-50">التاريخ الميلادي</p><p id="gregDate" class="font-black text-sm"></p></div>
        </div>
    </section>

    <main class="p-5">
        <div id="prayerGrid" class="flex gap-4 overflow-x-auto pb-6 no-scrollbar"></div>

        <div class="grid grid-cols-4 gap-4 mb-10 text-center">
            <div onclick="window.location.href='https://quranalyze.com/qibla/'" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md text-teal-800"><i class="fas fa-compass text-xl"></i></div>
                <span class="text-[10px] font-black">القبلة</span>
            </div>
            <div onclick="window.location.href='azkar.html'" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md text-teal-800"><i class="fas fa-fingerprint text-xl"></i></div>
                <span class="text-[10px] font-black">المسبحة</span>
            </div>
            <div onclick="window.location.href='https://quran.com/ar'" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md text-teal-800"><i class="fas fa-book-quran text-xl"></i></div>
                <span class="text-[10px] font-black">المصحف</span>
            </div>
            <div onclick="alert('سُبْحَانَ اللهِ، وَالْحَمْدُ للهِ، وَلَا إِلَهَ إِلَّا اللهُ، وَاللهُ أَكْبَرُ')" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md text-teal-800"><i class="fas fa-heart text-xl"></i></div>
                <span class="text-[10px] font-black">أدعية</span>
            </div>
        </div>

        <div class="section-title border-r-4 border-yellow-500 pr-3 mb-4"><span class="font-black text-teal-900">أذكار المسجد</span></div>
        <div class="space-y-4">
            <div onclick="alert('اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ')" class="bg-white p-6 rounded-[30px] shadow-sm flex justify-between items-center border border-emerald-50">
                <div><p class="text-[10px] opacity-40 font-bold mb-1">عند الدخول</p><p class="font-black text-teal-900 text-lg">دعاء دخول المسجد</p></div>
                <i class="fas fa-door-open text-emerald-600 text-2xl"></i>
            </div>
        </div>
    </main>

    <div id="settingsPanel" class="settings-panel p-10">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-2xl font-black text-teal-900 mb-8">إعدادات المواقيت</h3>
        <button onclick="requestLocation()" class="w-full bg-teal-800 text-white py-5 rounded-3xl font-black mb-4"><i class="fas fa-location-crosshairs ml-2"></i> تحديث الموقع الآن</button>
        <button onclick="toggleSettings()" class="w-full bg-gray-100 text-gray-500 py-5 rounded-3xl font-black">إغلاق</button>
    </div>

    <script>
        let prayerTimes = {};

        async function initApp() {
            const lat = localStorage.getItem('lat') || "30.0444";
            const lon = localStorage.getItem('lon') || "31.2357";
            document.getElementById('locationStatus').innerText = localStorage.getItem('lat') ? "موقع دقيق (GPS)" : "موقع افتراضي (القاهرة)";
            await fetchPrayers(lat, lon);
        }

        async function fetchPrayers(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                
                renderPrayers();
                updateDates(data.data.date);
                startCountdown();
            } catch (e) { alert("تأكد من اتصالك بالإنترنت"); }
        }

        function renderPrayers() {
            const grid = document.getElementById('prayerGrid');
            const list = [
                {n:'الفجر', t:prayerTimes.Fajr}, {n:'الشروق', t:prayerTimes.Sunrise}, 
                {n:'الظهر', t:prayerTimes.Dhuhr}, {n:'العصر', t:prayerTimes.Asr}, 
                {n:'المغرب', t:prayerTimes.Maghrib}, {n:'العشاء', t:prayerTimes.Isha}
            ];
            grid.innerHTML = list.map(p => `
                <div class="prayer-card p-5 text-center shadow-sm border border-gray-100">
                    <p class="text-[10px] font-bold text-teal-600 mb-2 uppercase">${p.n}</p>
                    <p class="font-black text-xl text-teal-900">${p.t}</p>
                </div>
            `).join('');
        }

        function updateDates(dateData) {
            document.getElementById('hijriDate').innerText = `${dateData.hijri.day} ${dateData.hijri.month.ar} ${dateData.hijri.year}`;
            document.getElementById('gregDate').innerText = dateData.gregorian.date;
        }

        function startCountdown() {
            setInterval(() => {
                const now = new Date();
                const pList = [
                    {n:'الفجر', t:prayerTimes.Fajr}, {n:'الظهر', t:prayerTimes.Dhuhr}, 
                    {n:'العصر', t:prayerTimes.Asr}, {n:'المغرب', t:prayerTimes.Maghrib}, 
                    {n:'العشاء', t:prayerTimes.Isha}
                ];

                let next = null;
                for (let p of pList) {
                    const [h, m] = p.t.split(':');
                    const pDate = new Date();
                    pDate.setHours(h, m, 0);
                    if (pDate > now) { next = { ...p, d: pDate }; break; }
                }

                if (!next) {
                    const [h, m] = pList[0].t.split(':');
                    const pDate = new Date(); pDate.setDate(pDate.getDate() + 1); pDate.setHours(h, m, 0);
                    next = { ...pList[0], d: pDate };
                }

                const diff = next.d - now;
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);

                document.getElementById('mainCountdown').innerText = 
                    `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                document.getElementById('nextPrayerTitle').innerText = `باقي على صلاة ${next.n}`;
            }, 1000);
        }

        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    localStorage.setItem('lat', p.coords.latitude);
                    localStorage.setItem('lon', p.coords.longitude);
                    location.reload();
                }, () => alert("فشل تحديد الموقع. تأكد من تفعيل الـ GPS"));
            }
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }

        initApp();
    </script>
</body>
        </html>
