<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف أبا مالك الاحترافي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root { --quran-bg: #f4ece1; --text-color: #2c2c2c; --menu-bg: #ffffff; }
        body.dark-mode { --quran-bg: #1a1a1a; --text-color: #ffffff; --menu-bg: #2c2c2c; }
        body { font-family: 'Cairo', sans-serif; background-color: #121212; margin: 0; overflow: hidden; transition: 0.3s; }
        
        /* القائمة الجانبية (مثل الفيديو) */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--menu-bg); z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -5px 0 25px rgba(0,0,0,0.5); color: var(--text-color); overflow-y: auto; }
        #sideMenu.open { right: 0; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .menu-item:active { background: rgba(0,0,0,0.1); }
        .menu-item i { color: #c5a059; width: 20px; }

        /* حاوية المصحف */
        #book-container { height: calc(100vh - 70px); display: flex; justify-content: center; align-items: center; background: #222; }
        .page { background-color: var(--quran-bg); box-shadow: inset 0 0 50px rgba(0,0,0,0.1); overflow: hidden; }
        .page-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .page img { width: 95%; height: 95%; object-fit: contain; }

        /* التفسير (يظهر أسفل الصفحة) */
        #tafseerPanel { position: fixed; bottom: -50%; left: 0; width: 100%; height: 40%; background: var(--menu-bg); z-index: 9000; transition: 0.4s; padding: 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); overflow-y: auto; color: var(--text-color); }
        #tafseerPanel.open { bottom: 0; }

        /* شريط التحكم */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; color: #fff; z-index: 5000; }
        .page-indicator { background: #c5a059; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="sideMenu" class="no-scrollbar">
        <div class="p-6 bg-[#c5a059] text-black font-black text-center mb-4">خيارات المصحف</div>
        <div class="menu-item" onclick="toggleSearch()"><i class="fas fa-search"></i> البحث في القرآن</div>
        <div class="menu-item" onclick="showFahras()"><i class="fas fa-list"></i> الفهرس (السور)</div>
        <div class="menu-item" onclick="toggleTafseer()"><i class="fas fa-book-open"></i> التفسير الميسر</div>
        <div class="menu-item" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div class="menu-item" onclick="window.location.href='mosque.html'"><i class="fas fa-home"></i> العودة للمحراب</div>
    </div>

    <div id="tafseerPanel">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="font-black text-lg">التفسير الميسر</h3>
            <i class="fas fa-times cursor-pointer" onclick="toggleTafseer()"></i>
        </div>
        <p id="tafseerText" class="leading-relaxed">انقر على "التفسير" لعرض شرح الصفحة الحالية...</p>
    </div>

    <div id="book-container">
        <div id="myBook">
            </div>
    </div>

    <div class="bottom-nav">
        <button onclick="pageFlip.flipPrev()"><i class="fas fa-chevron-right text-2xl"></i></button>
        <div class="flex flex-col items-center" onclick="toggleMenu()">
            <span id="pageLabel" class="page-indicator">1</span>
            <span class="text-[9px] mt-1 font-bold">القائمة</span>
        </div>
        <button onclick="pageFlip.flipNext()"><i class="fas fa-chevron-left text-2xl"></i></button>
    </div>

    <script>
        let pageFlip;
        const bookElem = document.getElementById('myBook');

        // 1. توليد الصفحات (صور عالية الدقة)
        function buildBook() {
            let html = '';
            for (let i = 1; i <= 604; i++) {
                const imgUrl = `https://pcloud.github.io/quran-ayats/600/${i}.png`;
                html += `
                    <div class="page" data-density="hard">
                        <div class="page-content">
                            <img src="${imgUrl}" loading="lazy">
                        </div>
                    </div>`;
            }
            bookElem.innerHTML = html;
        }

        // 2. تشغيل محرك التقليب (Page Flip)
        function initFlip() {
            pageFlip = new St.PageFlip(bookElem, {
                width: window.innerWidth,
                height: window.innerHeight - 70,
                size: "stretch",
                showCover: false,
                drawShadow: true,
                usePortrait: true,
                mobileScrollSupport: false
            });
            pageFlip.loadFromHTML(document.querySelectorAll(".page"));
            
            pageFlip.on('flip', (e) => {
                document.getElementById('pageLabel').innerText = e.data + 1;
            });
        }

        // 3. الوظائف المطلوبة (الفيديو)
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('quran_dark', document.body.classList.contains('dark-mode'));
        }

        function toggleTafseer() {
            document.getElementById('tafseerPanel').classList.toggle('open');
            // هنا يمكن إضافة جلب التفسير آلياً بناءً على رقم الصفحة
            document.getElementById('tafseerText').innerText = "هذا التفسير مخصص للصفحة رقم " + (pageFlip.getCurrentPageIndex() + 1);
        }

        function toggleSearch() {
            const query = prompt("أدخل الكلمة التي تبحث عنها:");
            if (query) alert("ميزة البحث تتطلب قاعدة بيانات ضخمة، سيتم ربطها في التحديث القادم.");
        }

        function showFahras() {
            alert("الفهرس: سيتم عرض قائمة السور الـ 114 هنا.");
        }

        // بدء التشغيل
        buildBook();
        window.onload = () => {
            initFlip();
            if(localStorage.getItem('quran_dark') === 'true') document.body.classList.add('dark-mode');
        };
    </script>
</body>
</html>
