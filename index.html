    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.5s; padding-bottom: 90px; }

        /* الوضع الفاتح */
        body.light-mode { background-color: #f0f2f5; color: #1a1a1a; }
        body.light-mode .bg-image { background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); }

        /* إصلاح حركة النبض */
        @keyframes pulse-custom {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(0.9); opacity: 1; }
        }
        .pulse-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; animation: pulse-custom 1.5s infinite; }

        .mosque-btn { background: linear-gradient(90deg, #166534, #15803d); color: white; }
        .azkar-btn { background: linear-gradient(90deg, #1e3a8a, #1d4ed8); color: white; }
        .gallery-btn { background: linear-gradient(90deg, #b45309, #d97706); color: white; }
        .wisdom-btn { background: linear-gradient(90deg, #581c87, #6d28d9); color: white; }
        .rating-btn { background: linear-gradient(90deg, #f59e0b, #d97706); color: white; }
        .games-btn { background: linear-gradient(to r, #064e3b, #065f46); color: white; }

        .theme-toggle { position: fixed; top: 60px; left: 20px; z-index: 100; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 10px 25px 10px; display: flex; justify-content: space-around; }
        .nav-item { color: rgba(255,255,255,0.4); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-item.active { color: #fbbf24; }

                <a href="tel:+201113412908" class="bg-white text-black flex items-center justify-center gap-2 py-4 rounded-2xl font-bold"><i class="fas fa-phone-alt"></i> اتصال</a>

    <div id="wisdomModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass p-8 max-w-sm w-full text-center border-2 border-yellow-500/50 relative">
            <div class="absolute top-4 w-full left-0 px-6 flex justify-between">

    <div id="ratingModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">

                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(1)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(2)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(3)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(4)"></i>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script src="app.js"></script>
    <script src="wisdoms.js"></script> <script>
        // كود تبديل المظهر (Theme)
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-sun');
            icon.classList.toggle('fa-moon');
        });

        // كود بسيط لعرض الحكمة (إذا لم تكن موجودة في ملف خارجي)
        function showWisdom() {
            const wisdoms = ["كن مع الله ولا تبالي", "الوقت كالسيف إن لم تقطعه قطعك", "ابتسم فالله ربك"];
            const text = wisdoms[Math.floor(Math.random() * wisdoms.length)];
            document.getElementById('wisdomText').innerText = text;
            document.getElementById('wisdomModal').classList.remove('hidden');
        }
        function closeWisdom() { document.getElementById('wisdomModal').classList.add('hidden'); }
    </script>
