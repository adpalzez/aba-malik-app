<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف أبا مالك</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body { margin: 0; background-color: #f4ece1; font-family: 'Cairo', sans-serif; overflow: hidden; }
        .swiper { width: 100vw; height: calc(100vh - 70px); }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 5000; border-top: 3px solid #c5a059; }
        .btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .page-badge { background: #c5a059; color: black; padding: 5px 20px; border-radius: 20px; font-weight: 900; font-size: 18px; }
        .home-btn { color: #c5a059; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="quranSlider"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="swiper.slideNext()"><i class="fas fa-chevron-right"></i></button>
        
        <a href="mosque.html" class="home-btn"><i class="fas fa-home"></i></a>
        
        <span id="pageNum" class="page-badge">1</span>
        
        <button class="btn" onclick="swiper.slidePrev()"><i class="fas fa-chevron-left"></i></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // كود تدمير الذاكرة القديمة إجبارياً
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister(); // مسح الكاش القديم
                }
            });
        }

        // بناء صفحات المصحف من سيرفر CDN سريع جداً
        let html = '';
        for (let i = 1; i <= 604; i++) {
            // استخدام رابط قوي ومستقر يتجاوز الحجب والبطء
            const imgUrl = `https://cdn.jsdelivr.net/gh/itxtools/quran-images@master/images/${i}.png`;
            html += `
            <div class="swiper-slide">
                <img src="${imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/600x800?text=جاري+التحميل...'">
            </div>`;
        }
        document.getElementById('quranSlider').innerHTML = html;

        // تشغيل المصحف
        var swiper = new Swiper(".mySwiper", {
            on: {
                slideChange: function () {
                    document.getElementById('pageNum').innerText = this.activeIndex + 1;
                }
            }
        });
    </script>
</body>
    </html>
