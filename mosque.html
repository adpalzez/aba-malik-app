<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ركن المسجد | أبا مالك العقيلي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main-teal: #064e3b; --accent-gold: #fbbf24; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        .hero-section { 
            background: linear-gradient(rgba(6, 78, 59, 0.8), rgba(6, 78, 59, 0.9)), 
                        url('https://i.ibb.co/pBhzxHdM/1000027317.jpg');
            background-size: cover; background-position: center;
            border-radius: 0 0 40px 40px; color: white;
        }

        .prayer-card { background: white; border-radius: 20px; transition: 0.3s; border: 1px solid #e2e8f0; }
        .tool-icon { background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--main-teal); cursor: pointer; }
        
        .section-title { font-weight: 900; font-size: 1.1rem; border-right: 4px solid var(--accent-gold); padding-right: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .content-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <section class="hero-section p-6 text-center shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="w-8 h-8 rounded-full border-2 border-yellow-500">
                <span class="text-xs font-bold">أبا مالك العقيلي</span>
            </div>
            <i onclick="refreshLocation()" class="fas fa-location-crosshairs text-yellow-500 cursor-pointer"></i>
        </div>

        <div class="py-8 animate__animated animate__fadeIn">
            <p id="nextPrayerName" class="text-yellow-400 font-bold mb-1">جاري تحديد الموقع...</p>
            <h2 id="countdownTimer" class="text-5xl font-black mb-4 tracking-tighter">00:00</h2>
            <p id="cityLabel" class="text-[10px] opacity-70"><i class="fas fa-location-dot"></i> موقع افتراضي (القاهرة)</p>
        </div>

        <div class="flex justify-between items-center text-[10px] mt-4 bg-black/20 p-3 rounded-2xl">
            <div class="text-right"><p id="hDate" class="font-bold text-yellow-500"></p></div>
            <div class="text-left"><p id="gDate" class="opacity-80"></p></div>
        </div>
    </section>

    <main class="p-4">
        <div id="prayerGrid" class="flex gap-3 overflow-x-auto pb-4 mb-8 no-scrollbar"></div>

        <div class="grid grid-cols-4 gap-4 mb-10 text-center">
            <div onclick="window.location.href='https://quranalyze.com/qibla/'" class="flex flex-col items-center gap-2">
                <div class="tool-icon"><i class="fas fa-compass"></i></div>
                <span class="text-[9px] font-bold">القبلة</span>
            </div>
            <div onclick="window.location.href='azkar.html'" class="flex flex-col items-center gap-2">
                <div class="tool-icon"><i class="fas fa-fingerprint"></i></div>
                <span class="text-[9px] font-bold">المسبحة</span>
            </div>
            <div onclick="window.location.href='https://quran.com/ar'" class="flex flex-col items-center gap-2">
                <div class="tool-icon"><i class="fas fa-book-quran"></i></div>
                <span class="text-[9px] font-bold">المصحف</span>
            </div>
            <div onclick="openAzkarModal('سُبْحَانَ اللهِ، وَالْحَمْدُ للهِ، وَلَا إِلَهَ إِلَّا اللهُ، وَاللهُ أَكْبَرُ', 'الباقيات الصالحات')" class="flex flex-col items-center gap-2">
                <div class="tool-icon"><i class="fas fa-heart"></i></div>
                <span class="text-[9px] font-bold">أدعية</span>
            </div>
        </div>

        <div class="section-title"><span>أذكار المسجد</span></div>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <div onclick="openAzkarModal('بِسْمِ اللهِ، وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللهِ، اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ.', 'دعاء دخول المسجد')" 
                 class="content-card p-5 flex justify-between items-center border-l-4 border-emerald-600">
                <div>
                    <p class="text-[10px] opacity-50 mb-1">عند الدخول</p>
                    <p class="font-bold text-teal-900">دعاء دخول المسجد</p>
                </div>
                <i class="fas fa-door-open text-emerald-600 text-xl"></i>
            </div>

            <div onclick="openAzkarModal('بِسْمِ اللهِ، وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللهِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ.', 'دعاء الخروج من المسجد')" 
                 class="content-card p-5 flex justify-between items-center border-l-4 border-orange-400">
                <div>
                    <p class="text-[10px] opacity-50 mb-1">عند الخروج</p>
                    <p class="font-bold text-teal-900">دعاء الخروج من المسجد</p>
                </div>
                <i class="fas fa-walking text-orange-400 text-xl"></i>
            </div>
        </div>
    </main>

    <div id="azkarModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-[350px] rounded-[35px] overflow-hidden shadow-2xl animate__animated animate__zoomIn">
            <div class="bg-teal-800 p-5 text-center text-white relative">
                <h3 id="modalTitle" class="font-bold">الذكر</h3>
                <button onclick="closeAzkarModal()" class="absolute left-4 top-5 opacity-70"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8 text-center">
                <p id="modalText" class="text-xl font-black leading-relaxed text-teal-900 mb-8"></p>
                <button onclick="closeAzkarModal()" class="bg-teal-800 text-white w-full py-4 rounded-2xl font-bold">تمت القراءة</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div onclick="window.location.href='index.html'" class="flex flex-col items-center text-gray-400 gap-1 cursor-pointer">
            <i class="fas fa-th-large text-lg"></i><span class="text-[9px] font-bold">استكشف</span>
        </div>
        <div class="flex flex-col items-center text-teal-800 gap-1">
            <i class="fas fa-mosque text-lg"></i><span class="text-[9px] font-bold">الصلاة</span>
        </div>
        <div onclick="window.location.href='azkar.html'" class="flex flex-col items-center text-gray-400 gap-1 cursor-pointer">
            <i class="fas fa-book-open text-lg"></i><span class="text-[9px] font-bold">الأذكار</span>
        </div>
    </nav>

    <script>
        // دالة جلب المواقيت بناءً على الإحداثيات
        async function getPrayers() {
            // جلب الموقع من الذاكرة أو استخدام القاهرة افتراضياً
            const lat = localStorage.getItem('aba_malik_lat') || "30.0444";
            const lon = localStorage.getItem('aba_malik_lon') || "31.2357";
            
            if (localStorage.getItem('aba_malik_lat')) {
                document.getElementById('cityLabel').innerHTML = '<i class="fas fa-location-dot"></i> موقعك الحالي (محفوظ)';
            }

            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                const t = data.data.timings;
                
                const grid = document.getElementById('prayerGrid');
                const pMap = [
                    {n:'الفجر', t:t.Fajr}, {n:'الشروق', t:t.Sunrise}, {n:'الظهر', t:t.Dhuhr}, 
                    {n:'العصر', t:t.Asr}, {n:'المغرب', t:t.Maghrib}, {n:'العشاء', t:t.Isha}
                ];

                grid.innerHTML = pMap.map(p => `
                    <div class="prayer-card p-4 min-w-[95px] text-center shadow-sm">
                        <p class="text-[9px] font-bold opacity-60 mb-2">${p.n}</p>
                        <p class="text-lg font-black text-teal-900">${p.t}</p>
                    </div>
                `).join('');

                document.getElementById('hDate').innerText = `${data.data.date.hijri.day} ${data.data.date.hijri.month.ar} ${data.data.date.hijri.year}`;
                document.getElementById('gDate').innerText = data.data.date.gregorian.date;
                document.getElementById('nextPrayerName').innerText = "تم تحديث المواقيت";
                
            } catch(e) { 
                console.log("Error loading prayers"); 
                document.getElementById('nextPrayerName').innerText = "خطأ في الاتصال";
            }
        }

        // دالة تحديث وحفظ الموقع الجغرافي
        function refreshLocation() {
            if (navigator.geolocation) {
                document.getElementById('nextPrayerName').innerText = "جاري تحديد الموقع...";
                navigator.geolocation.getCurrentPosition((p) => {
                    localStorage.setItem('aba_malik_lat', p.coords.latitude);
                    localStorage.setItem('aba_malik_lon', p.coords.longitude);
                    alert("تم حفظ موقعك بنجاح!");
                    getPrayers();
                }, () => {
                    alert("يرجى تفعيل GPS وإذن الموقع في المتصفح.");
                });
            } else {
                alert("متصفحك لا يدعم تحديد الموقع.");
            }
        }

        function openAzkarModal(text, title) {
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('azkarModal').classList.remove('hidden');
        }

        function closeAzkarModal() {
            document.getElementById('azkarModal').classList.add('hidden');
        }

        // البدء بمحاولة جلب الموقع إذا لم يكن محفوظاً
        if (!localStorage.getItem('aba_malik_lat')) {
            refreshLocation();
        } else {
            getPrayers();
        }
    </script>
</body>
    </html>
