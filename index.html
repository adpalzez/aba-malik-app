<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة أبا مالك | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.5s; background-attachment: fixed; overflow-x: hidden; }
        .glass { background: rgba(0,0,0,0.65); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; }
        .bg-image { background-image: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; }
        
        body.light-mode { background-color: #f8fafc; color: #1e293b; }
        body.light-mode .bg-image { background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); }
        body.light-mode .glass { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.05); color: #1e293b; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; }
        .full-width { grid-column: span 2; }
        
        .btn-mosque { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; }
        .btn-azkar { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); color: #3b82f6; }
        .btn-wisdom { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); color: #fbbf24; }
        .btn-rating { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.4); color: #f43f5e; }
        
        .btn-premium { transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn-premium:active { transform: scale(0.92); filter: brightness(1.2); }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 15px 10px 30px; display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: rgba(255,255,255,0.3); transition: 0.3s; font-size: 1.3rem; }
        .nav-item.active { color: #fbbf24; transform: translateY(-8px); text-shadow: 0 0 15px #fbbf24; }
        
        .points-badge { background: linear-gradient(135deg, #fbbf24, #d97706); box-shadow: 0 4px 20px rgba(217, 119, 6, 0.5); }
        .prayer-bar { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 4px 12px; }
    </style>
</head>
<body class="bg-black text-white min-h-screen bg-image flex flex-col items-center p-4 pb-32">

    <header class="w-full max-w-md flex justify-between items-center mb-8 mt-2 z-[1001] sticky top-2">
        <button id="themeToggle" class="glass w-10 h-10 flex items-center justify-center border border-white/10 active:scale-90 transition">
            <i id="themeIcon" class="fas fa-moon text-yellow-400"></i>
        </button>

        <div class="prayer-bar flex items-center gap-3 animate__animated animate__fadeInDown">
            <span id="nextPrayerName" class="text-[10px] font-bold text-yellow-500 uppercase">الصلاة</span>
            <span id="prayerTimer" class="text-xs font-mono font-black text-white">00:00:00</span>
        </div>

        <div class="points-badge px-4 py-1.5 rounded-full flex items-center gap-2">
            <i class="fas fa-star text-white text-[10px]"></i>
            <span class="text-xs font-black" id="userPoints">0</span>
        </div>
    </header>

    <main class="glass w-full max-w-md p-8 text-center mb-6 border border-white/5 animate__animated animate__zoomIn">
        <h2 class="text-4xl font-black mb-1 tracking-tighter uppercase tracking-widest">أبا مالك العقيلي</h2>
        <p class="text-blue-400 text-[9px] font-bold tracking-[0.4em] uppercase mb-10 opacity-80">المملكة النخبوية 2026</p>

        <div class="bg-white/5 rounded-[30px] p-5 mb-8 border border-white/5">
            <p class="text-[9px] text-gray-400 mb-4 uppercase font-black tracking-widest text-right">نبض القلب الآن</p>
            <div class="flex justify-between items-center px-4">
                <button onclick="setMood('happy')" class="text-3xl hover:scale-125 transition">😊</button>
                <button onclick="setMood('grateful')" class="text-3xl hover:scale-125 transition">🤲</button>
                <button onclick="setMood('anxious')" class="text-3xl hover:scale-125 transition">😟</button>
                <button onclick="setMood('tired')" class="text-3xl hover:scale-125 transition">😴</button>
            </div>
        </div>

        <button id="installApp" class="hidden w-full bg-white/10 border border-dashed border-white/30 py-4 rounded-[25px] mb-6 flex items-center justify-center gap-2">
            <i class="fas fa-download text-blue-400"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">تثبيت التطبيق</span>
        </button>

        <div class="menu-grid mb-8">
            <a href="prayer.html?v=1.1" class="btn-mosque btn-premium p-5 rounded-[30px] shadow-lg">
                <i class="fas fa-mosque text-2xl"></i>
                <span class="text-[10px] font-black uppercase">ركن المسجد</span>
            </a>
            <a href="azkar.html?v=1.1" class="btn-azkar btn-premium p-5 rounded-[30px] shadow-lg">
                <i class="fas fa-book-open text-2xl"></i>
                <span class="text-[10px] font-black uppercase">الأذكار</span>
            </a>
            <button onclick="showRandomWisdom()" class="btn-wisdom btn-premium p-5 rounded-[30px] shadow-lg">
                <i class="fas fa-lightbulb text-2xl"></i>
                <span class="text-[10px] font-black uppercase">الحكمة</span>
            </button>
            <button onclick="openRating()" class="btn-rating btn-premium p-5 rounded-[30px] shadow-lg">
                <i class="fas fa-star text-2xl"></i>
                <span class="text-[10px] font-black uppercase">التقييم</span>
            </button>
            <a href="games.html?v=1.1" class="full-width bg-gradient-to-r from-emerald-900 to-green-600 py-5 rounded-[30px] flex items-center justify-center gap-3 shadow-xl border border-white/10">
                <i class="fas fa-chess-rook text-xl text-yellow-400"></i>
                <span class="text-xs font-black text-white uppercase tracking-widest">مملكة صلاح الدين</span>
            </a>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="https://wa.me/201113412908" class="bg-[#2ecc71] py-4 rounded-2xl text-[11px] font-black flex justify-center items-center gap-2 shadow-lg"><i class="fab fa-whatsapp text-lg"></i> واتساب</a>
            <a href="tel:+201113412908" class="bg-white text-black py-4 rounded-2xl text-[11px] font-black flex justify-center items-center gap-2 shadow-lg"><i class="fas fa-phone-alt"></i> اتصال</a>
        </div>
    </main>

    <section class="glass w-full max-w-md p-6 mb-8 border border-blue-500/20 shadow-xl">
        <textarea id="postInput" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white placeholder-gray-500 focus:outline-none" placeholder="خاطرة جديدة للمملكة..." rows="2"></textarea>
        <button onclick="addNewPost()" class="w-full bg-blue-600 mt-3 py-3 rounded-xl text-xs font-black uppercase shadow-lg active:scale-95 transition">نشر الخاطرة</button>
    </section>

    <section class="posts-container w-full max-w-md space-y-4"></section>

    <nav class="nav-bottom shadow-2xl">
        <a href="index.html?v=1.1" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="prayer.html?v=1.1" class="nav-item"><i class="fas fa-mosque"></i></a>
        <a href="posts.html?v=1.1" class="nav-item"><i class="fas fa-paper-plane"></i></a>
        <a href="azkar.html?v=1.1" class="nav-item"><i class="fas fa-book-open"></i></a>
    </nav>

    <div id="wisdomModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-md">
        <div class="glass p-10 max-w-sm w-full text-center border-2 border-yellow-500/30 animate__animated animate__zoomIn">
            <i class="fas fa-quote-right text-yellow-500 text-5xl mb-6"></i>
            <div id="wisdomText" class="text-lg font-black leading-relaxed mb-8 text-white"></div>
            <button onclick="closeWisdom()" class="w-full py-4 bg-yellow-600 rounded-full font-black text-white shadow-xl">آمنت بالله</button>
        </div>
    </div>

    <div id="ratingModal" class="fixed inset-0 z-[1100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass p-8 max-w-sm w-full text-center relative border-2 border-orange-500/50">
            <button onclick="document.getElementById('ratingModal').classList.add('hidden')" class="absolute top-4 left-4 text-gray-400"><i class="fas fa-times text-xl"></i></button>
            <h3 class="text-xl font-black mb-6 text-white uppercase tracking-widest">رأيك يهمنا</h3>
            <div class="flex justify-center gap-2 mb-6 text-4xl">
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="1"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="2"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="3"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="4"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="5"></i>
            </div>
            <textarea id="ratingComment" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white focus:outline-none mb-4" placeholder="ملاحظاتك..." rows="3"></textarea>
            <button id="submitRatingBtn" class="bg-orange-600 text-white px-8 py-4 rounded-full font-black w-full opacity-50 mt-4 shadow-lg transition" disabled>إرسال التقييم</button>
        </div>
    </div>

    <footer class="mt-auto py-10 text-center opacity-30">
        <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-white">&copy; 2026 أبا مالك العقيلي</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="app.js?v=1.1"></script>
    <script src="wisdoms.js?v=1.1"></script>
</body>
                </html>
