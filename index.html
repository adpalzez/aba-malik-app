<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محراب أبا مالك العقيلي</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=14.0');
        }
        window.onload = () => {
            setTimeout(() => {
                window.location.replace("mosque.html");
            }, 500); 
        };
    </script>
</head>
<body style="background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center; color: #fbbf24; font-family: sans-serif;">
        <div style="border: 4px solid #fbbf24; border-top: 4px solid transparent; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p style="font-weight: bold; font-size: 1.2rem;">جاري فتح المحراب...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
