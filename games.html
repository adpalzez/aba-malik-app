<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة صلاح الدين - القائد أبا مالك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.85); min-height: 100vh; }
        .resource-card { background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(10px); border: 1px solid #4b5563; transition: 0.3s; }
        .resource-card:hover { transform: translateY(-5px); border-color: #eab308; }
        .glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .attack-anim { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); background: rgba(220, 38, 38, 0.2); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body class="text-white">

<div class="overlay p-4">
    <header class="text-center mb-6 animate__animated animate__fadeInDown">
        <h1 class="text-4xl font-black text-yellow-500 mb-2 drop-shadow-2xl">مملكة صلاح الدين الأيوبي</h1>
        <p id="rankDisplay" class="text-blue-400 font-bold tracking-widest text-lg transition-all duration-500">القائد العسكري: أبا مالك</p>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/gold-bars.png" class="mx-auto mb-2">
            <div id="goldCount" class="text-2xl font-bold">100</div>
            <span class="text-xs text-yellow-500 font-bold">خزينة الذهب</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/wood-log.png" class="mx-auto mb-2">
            <div id="woodCount" class="text-2xl font-bold">100</div>
            <span class="text-xs text-amber-500 font-bold">مخزن الخشب</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/crusader.png" class="mx-auto mb-2">
            <div id="armyCount" class="text-2xl font-bold">0</div>
            <span class="text-xs text-red-500 font-bold">الجيش النظامي</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/castle.png" class="mx-auto mb-2">
            <div id="castleCount" class="text-2xl font-bold">0</div>
            <span class="text-xs text-blue-500 font-bold">القلاع المشيدة</span>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-6">
            <div class="bg-gray-800/60 p-6 rounded-3xl border-2 border-yellow-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-hammer text-yellow-500"></i> الإنتاج اليومي</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="produce('gold')" class="bg-yellow-600 hover:bg-yellow-500 p-6 rounded-2xl font-bold text-black shadow-lg transition active:scale-90">سك الذهب</button>
                    <button onclick="produce('wood')" class="bg-amber-800 hover:bg-amber-700 p-6 rounded-2xl font-bold text-white shadow-lg transition active:scale-90">جمع الخشب</button>
                </div>
            </div>
            
            <div class="glass p-6 rounded-3xl border-t-4 border-red-600 animate__animated animate__fadeIn">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-white">غرفة عمليات القائد</h3>
                    <div class="flex gap-2">
                        <button onclick="resetGame()" class="text-[10px] bg-white/10 hover:bg-red-900 px-2 py-1 rounded text-white transition">ضبط المملكة</button>
                        <span class="bg-red-600 text-[10px] px-3 py-1 rounded-full animate-pulse uppercase">حالة الحرب: نشطة</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[10px] text-gray-400 uppercase">قوة الجيش</p>
                        <p id="armyPower" class="text-2xl font-black text-red-500">150</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[10px] text-gray-400 uppercase">مستوى الهيبة</p>
                        <p id="prestige" class="text-2xl font-black text-purple-500">1</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="trainElite()" class="w-full bg-gradient-to-r from-blue-900 to-blue-700 p-4 rounded-xl font-bold flex justify-between items-center hover:brightness-125 transition">
                        <span>تدريب فرقة نُخبة (💰100)</span>
                        <i class="fas fa-shield-alt"></i>
                    </button>
                    <button id="attackBtn" onclick="executeAttack()" class="w-full bg-gradient-to-r from-red-900 to-red-600 p-4 rounded-xl font-black text-lg shadow-lg flex justify-center items-center gap-3 active:scale-95 transition">
                        <i class="fas fa-fire"></i> شن هجوم كاسح
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-gray-800/60 p-6 rounded-3xl border-2 border-red-900 shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-fist-raised text-red-500"></i> التجهيزات العسكرية</h2>
            <div class="space-y-4">
                <button onclick="buyUnit('army')" class="w-full bg-red-700 hover:bg-red-600 p-4 rounded-2xl font-bold flex justify-between items-center px-8 border-b-4 border-red-950 transition active:scale-95">
                    <div class="flex items-center gap-3"><span>تدريب محارب</span></div>
                    <span class="bg-black/30 px-3 py-1 rounded-lg">💰 50</span>
                </button>
                <button onclick="buyUnit('castle')" class="w-full bg-blue-700 hover:bg-blue-600 p-4 rounded-2xl font-bold flex justify-between items-center px-8 border-b-4 border-blue-950 transition active:scale-95">
                    <div class="flex items-center gap-3"><span>بناء قلعة</span></div>
                    <span class="bg-black/30 px-3 py-1 rounded-lg text-[10px]">💰 200 | 🌲 200</span>
                </button>
            </div>
            <div class="mt-8 bg-black/40 p-4 rounded-2xl border border-white/5 min-h-[150px]">
                <h3 class="text-center font-bold text-yellow-500 mb-4 text-xs italic">تشكيلات الجيش في الميدان</h3>
                <div id="armyVisuals" class="flex flex-wrap justify-center gap-2"></div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-10 pb-10">
        <a href="index.html" class="inline-block bg-white text-black px-12 py-3 rounded-2xl font-black shadow-2xl hover:bg-yellow-500 transition">العودة للديوان العام</a>
    </footer>
</div>

<script>
    let gold, wood, army, castles, power, prestige;

    // تشغيل عند تحميل الصفحة لاسترجاع البيانات
    window.onload = function() {
        const savedData = JSON.parse(localStorage.getItem('aba_malik_kingdom'));
        if (savedData) {
            gold = savedData.gold; wood = savedData.wood;
            army = savedData.army; castles = savedData.castles;
            power = savedData.power || (army * 10 + castles * 100 + 150);
            prestige = savedData.prestige;
            refreshArmyIcons(); 
        } else {
            resetToDefault();
        }
        update();
    };

    function resetToDefault() {
        gold = 100; wood = 100; army = 0; castles = 0; power = 150; prestige = 1;
        document.getElementById('armyVisuals').innerHTML = '';
    }

    function resetGame() {
        if(confirm("سيدي القائد، هل أنت متأكد من مسح تقدم المملكة والبدء من الصفر؟")) {
            resetToDefault();
            saveData();
            update();
        }
    }

    function produce(type) {
        if (type === 'gold') gold += 10;
        else wood += 15;
        update();
    }

    function buyUnit(type) {
        if (type === 'army' && gold >= 50) {
            gold -= 50; army++; power += 10;
            addSoldierIcon(true);
        } else if (type === 'castle' && gold >= 200 && wood >= 200) {
            gold -= 200; wood -= 200; castles++; power += 100;
        } else {
            alert("الموارد غير كافية!"); return;
        }
        update();
    }

    function trainElite() {
        if (gold >= 100) {
            gold -= 100; power += 50;
            alert("تم تدريب فرقة نُخبة يا أبا مالك!");
            update();
        } else { alert("الذهب لا يكفي لتدريب النخبة!"); }
    }

    function executeAttack() {
        if (power < 100) { alert("جيشك ضعيف جداً للهجوم!"); return; }
        const btn = document.getElementById('attackBtn');
        btn.disabled = true; btn.innerHTML = "جاري القتال...";
        document.body.classList.add('attack-anim');
        
        setTimeout(() => {
            document.body.classList.remove('attack-anim');
            let win = Math.random() > 0.4;
            if(win) {
                prestige++; gold += 150;
                alert("نصر ساحق! غنمنا 150 ذهبة وارتفعت هيبتك.");
            } else {
                power = Math.max(0, power - 30);
                alert("تراجعنا تكتيكياً.. خسرنا بعض القوة.");
            }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-fire"></i> شن هجوم كاسح';
            update();
        }, 1500);
    }

    function addSoldierIcon(isNew) {
        const div = document.getElementById('armyVisuals');
        const img = document.createElement('img');
        img.src = "https://img.icons8.com/color/96/knight.png";
        img.className = "w-8 h-8 " + (isNew ? "animate__animated animate__zoomIn" : "");
        div.appendChild(img);
    }

    function refreshArmyIcons() {
        const div = document.getElementById('armyVisuals');
        div.innerHTML = '';
        for(let i=0; i<army; i++) addSoldierIcon(false);
    }

    function saveData() {
        const gameData = { gold, wood, army, castles, power, prestige };
        localStorage.setItem('aba_malik_kingdom', JSON.stringify(gameData));
    }

    function update() {
        document.getElementById('goldCount').innerText = gold;
        document.getElementById('woodCount').innerText = wood;
        document.getElementById('armyCount').innerText = army;
        document.getElementById('castleCount').innerText = castles;
        document.getElementById('armyPower').innerText = power;
        document.getElementById('prestige').innerText = prestige;
        
        const rank = document.getElementById('rankDisplay');
        if (castles >= 10) {
            rank.innerText = "رتبة العرش: السلطان أبا مالك الفاتح";
            rank.className = "text-yellow-400 font-black tracking-widest text-xl animate__animated animate__tada animate__infinite";
        } else if (castles >= 5) {
            rank.innerText = "رتبة العرش: الأمير أبا مالك";
            rank.className = "text-blue-400 font-bold tracking-widest text-lg";
        } else if (prestige >= 5) {
            rank.innerText = "رتبة العرش: القائد المهاب أبا مالك";
        }
        saveData(); // الحفظ التلقائي عند كل تغيير
    }
</script>
</body>
</html>
