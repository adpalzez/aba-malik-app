<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركات أبا مالك العقيلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .post-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; overflow: hidden; margin-bottom: 24px; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ef4444; }
        /* زر الكاميرا العائم */
        .camera-btn { position: fixed; bottom: 80px; left: 20px; z-index: 100; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md p-4 border-b border-white/10 flex justify-between items-center">
        <a href="index.html" class="text-gray-400"><i class="fas fa-arrow-right text-xl"></i></a>
        <h1 class="text-xl font-black tracking-widest text-red-500">مشاركات أبا مالك</h1>
        <div class="w-6"></div> 
    </header>

    <div class="container mx-auto px-4 py-6 max-w-md" id="postsContainer">
        <div id="previewArea" class="hidden post-card border-2 border-dashed border-red-500 p-2 animate__animated animate__fadeIn">
            <p class="text-center text-xs text-red-500 mb-2 font-bold shadow-sm">معاينة الصورة قبل النشر</p>
            <img id="imagePreview" src="#" class="w-full h-64 object-cover rounded-xl shadow-lg">
            <button onclick="publishPost()" class="w-full bg-red-600 mt-3 py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">نشر الآن</button>
        </div>

        <div class="post-card">
            <div class="p-4 flex items-center gap-3">
                <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="profile-img">
                <div>
                    <h4 class="font-bold text-sm">أبا مالك العقيلي</h4>
                    <span class="text-[10px] text-gray-400">منذ ساعة • إشراف هندسي</span>
                </div>
            </div>
            <div class="px-4 pb-3">
                <p class="text-sm leading-relaxed">
                    الدقة في العمل هي سر النجاح. لقطة من موقع العمل اليوم.
                </p>
            </div>
            <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="w-full h-64 object-cover shadow-inner">
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*">
    <button onclick="document.getElementById('fileInput').click()" class="camera-btn bg-red-600 animate__animated animate__pulse animate__infinite">
        <i class="fas fa-camera text-white text-2xl shadow-sm"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-white/10 p-4 flex justify-around items-center z-[1000]">
        <a href="index.html" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-home text-xl"></i></a>
        <a href="azkar.html" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-book-open text-xl"></i></a>
    </nav>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const imagePreview = document.getElementById('imagePreview');

    fileInput.onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                previewArea.classList.remove('hidden');
                // التمرير لأعلى لرؤية المعاينة
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            reader.readAsDataURL(file);
        }
    };

    function publishPost() {
        alert("يا أبا مالك، تم حفظ الصورة في ذاكرة التطبيق المؤقتة. ميزة الرفع الدائم تحتاج لقاعدة بيانات، ولكن الآن يمكنك رؤية صورتك داخل التطبيق!");
        previewArea.classList.add('hidden');
    }
</script>

</body>
</html>
