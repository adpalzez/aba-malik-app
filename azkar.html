<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محراب أبا مالك | الإصدار الفائق 7.9</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --royal-color: #fbbf24; --bg-dark: #0a0a0a; --bg-card: #161616; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: #e5e7eb; scroll-behavior: smooth; overflow-x: hidden; }
        .royal-header { background: linear-gradient(180deg, var(--royal-color) 0%, #000 100%); border-radius: 0 0 45px 45px; padding: 30px 20px 60px 20px; transition: 0.8s; }
        .glass-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px; }
        .zkr-node { transition: 0.3s; background: var(--bg-card); border: 1px solid #222; border-radius: 32px; cursor: pointer; position: relative; overflow: hidden; }
        .zkr-node:active { transform: scale(0.96); background: #1c1c1c; }
        .glow-bar { height: 8px; background: var(--royal-color); transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 10px; box-shadow: 0 0 15px var(--royal-color); }
        .done-mark { position: absolute; inset: 0; background: rgba(16, 185, 129, 0.92); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; animation: bounceIn 0.6s; }
        .input-royal { background: rgba(255,255,255,0.04); border: 1px solid #333; border-radius: 18px; padding: 14px; width: 100%; color: white; margin-bottom: 12px; outline: none; transition: 0.3s; }
        .nav-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(18,18,18,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 18px; border-radius: 40px; border: 1px solid #333; z-index: 100; }
        .color-selector { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; transition: 0.3s; }
    </style>
</head>
<body class="pb-40" onload="initRoyalApp()">

    <div class="max-w-[450px] mx-auto min-h-screen">
        <header id="royalHeader" class="royal-header text-white mb-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <button onclick="location.href='index.html'" class="w-11 h-11 glass-box flex items-center justify-center"><i class="fas fa-chevron-right"></i></button>
                <div class="text-center">
                    <h1 class="text-2xl font-black tracking-tighter">محراب أبا مالك</h1>
                    <span class="text-[10px] opacity-60 font-bold uppercase tracking-[3px]">Ultra Edition 7.9</span>
                </div>
                <button onclick="toggleEditor()" class="w-11 h-11 glass-box flex items-center justify-center text-yellow-400"><i class="fas fa-palette"></i></button>
            </div>
            
            <div class="glass-box p-5 flex justify-between items-center text-xs">
                <div class="text-right"><p class="opacity-50 mb-1">ميلادي</p><p id="gDateDisplay" class="font-black text-sm"></p></div>
                <div class="h-10 w-[1px] bg-white/10"></div>
                <div class="text-left"><p class="opacity-50 mb-1">هجري</p><p id="hDateDisplay" class="font-black text-sm"></p></div>
            </div>
        </header>

        <main class="px-6">
            <div class="glass-box p-6 mb-10 flex justify-between items-center border-l-4 border-yellow-500">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-yellow-500 rounded-3xl flex items-center justify-center text-black shadow-lg">
                        <i class="fas fa-vihara text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-yellow-500 font-black uppercase mb-1">إجمالي التسبيحات</p>
                        <p id="totalCounterDisplay" class="text-4xl font-black font-mono tracking-tighter">0000</p>
                    </div>
                </div>
            </div>

            <div id="editorPanel" class="hidden glass-box p-7 mb-10 animate__animated animate__fadeInDown">
                <h3 class="text-yellow-500 font-black mb-6"><i class="fas fa-tools"></i> تخصيص المحراب</h3>
                <div class="flex gap-4 mb-8">
                    <div onclick="applyNewColor('#fbbf24')" class="color-selector bg-yellow-500"></div>
                    <div onclick="applyNewColor('#10b981')" class="color-selector bg-emerald-500"></div>
                    <div onclick="applyNewColor('#3b82f6')" class="color-selector bg-blue-500"></div>
                    <div onclick="applyNewColor('#a855f7')" class="color-selector bg-purple-500"></div>
                </div>
                <select id="selSection" class="input-royal bg-neutral-900">
                    <option value="morning">أذكار الصباح</option>
                    <option value="evening">أذكار المساء</option>
                    <option value="sleep">أذكار النوم</option>
                </select>
                <input type="text" id="inText" class="input-royal" placeholder="نص الذكر...">
                <input type="number" id="inCount" class="input-royal" placeholder="العدد المطلـوب...">
                <button onclick="saveZkrToDB()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black shadow-lg">إضافة للموسوعة</button>
            </div>

            <div id="gridHome" class="grid grid-cols-2 gap-5">
                <div onclick="openCategory('morning')" class="glass-box p-8 text-center cursor-pointer hover:bg-white/5 transition">
                    <i class="fas fa-sun text-4xl text-orange-500 mb-3"></i>
                    <p class="font-black text-sm">الصباح</p>
                </div>
                <div onclick="openCategory('evening')" class="glass-box p-8 text-center cursor-pointer hover:bg-white/5 transition">
                    <i class="fas fa-moon text-4xl text-purple-500 mb-3"></i>
                    <p class="font-black text-sm">المساء</p>
                </div>
                <div onclick="location.href='mosque.html'" class="glass-box p-8 text-center border-emerald-500/20 border-2 cursor-pointer hover:bg-emerald-500/10 transition">
                    <i class="fas fa-mosque text-4xl text-emerald-500 mb-3"></i>
                    <p class="font-black text-sm">المسجد</p>
                </div>
                <div onclick="openCategory('sleep')" class="glass-box p-8 text-center cursor-pointer hover:bg-white/5 transition">
                    <i class="fas fa-bed text-4xl text-blue-500 mb-3"></i>
                    <p class="font-black text-sm">النوم</p>
                </div>
                <div onclick="factoryReset()" class="col-span-2 glass-box p-4 text-center mt-2 border-red-900/20">
                    <i class="fas fa-trash-alt text-red-600 text-xs ml-2"></i>
                    <span class="font-black text-xs text-red-600">تصفير الذاكرة بالكامل</span>
                </div>
            </div>

            <div id="categoryView" class="hidden space-y-5 animate__animated animate__fadeInUp">
                <div id="itemsContainer"></div>
                <button onclick="backToHome()" class="w-full py-5 glass-box text-white font-black mt-6">العودة للرئيسية</button>
            </div>
        </main>

        <nav class="nav-fixed shadow-2xl">
            <i class="fas fa-home text-2xl text-yellow-500 cursor-pointer" onclick="backToHome()"></i>
            <i class="fas fa-magic text-2xl text-gray-500 cursor-pointer" onclick="toggleEditor()"></i>
            <i class="fas fa-history text-2xl text-gray-500 cursor-pointer" onclick="location.reload()"></i>
        </nav>
    </div>

    <script>
        let totalStats = parseInt(localStorage.getItem('ultra_total_clicks')) || 0;
        let royalTheme = localStorage.getItem('ultra_theme_color') || '#fbbf24';
        
        const initialData = {
            morning: [
             {t: "آية الكرسي: «اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلا نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ».", c: 1},
                {t: "سورة الإخلاص: «قُلْ هُوَ اللَّهُ أَحَدٌ * اللَّهُ الصَّمَدُ * لَمْ يَلِدْ وَلَمْ يُولَدْ * وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ».", c: 3},
                {t: "سورة الفلق: «قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِن شَرِّ مَا خَلَقَ * وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ».", c: 3},
                {t: "سورة الناس: «قُلْ أَعُوذُ بِرَبِّ النَّاسِ * مَلِكِ النَّاسِ * إِلَهِ النَّاسِ * مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ * الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ * مِنَ الْجِنَّةِ وَالنَّاسِ».", c: 3},
                {t: "«أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ».", c: 1},
                
                {t: "سيد الاستغفار: «اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ».", c: 1},
                
                {t: "«بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ».", c: 3},
                {t: "«رَضِيتُ بِاللَّهِ رَبَّاً، وَبِالْإِسْلَامِ دِيناً، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيّاً».", c: 3},
                {t: "«اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْكَرِيمِ ، مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ ، أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا ، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ».", c: 1},
              {t: "«حَسْبِـيَ اللّهُ لا إلهَ إلّا هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم..", c: 7},
                {t: "«لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ».", c: 100}
           
            ],
            evening: [
                {t: "آية الكرسي: «اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلا نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ».", c: 1},
              
           {t: "سورة الإخلاص: «قُلْ هُوَ اللَّهُ أَحَدٌ * اللَّهُ الصَّمَدُ * لَمْ يَلِدْ وَلَمْ يُولَدْ * وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ».", c: 3},
            {t: "سورة الفلق: «قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِن شَرِّ مَا خَلَقَ * وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ».", c: 3},
              
         {t: "سورة الناس: «قُلْ أَعُوذُ بِرَبِّ النَّاسِ * مَلِكِ النَّاسِ * إِلَهِ النَّاسِ * مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ * الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ * مِنَ الْجِنَّةِ وَالنَّاسِ».", c: 3},
     {t: "«أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ، وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ».", c: 1},
     {t: "سيد الاستغفار: «اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ».", c: 1},
     
  {t: "«حَسْبِـيَ اللّهُ لا إلهَ إلّا هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم..", c: 7},
      {t: "«بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ».", c: 3},
       {t: "«اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْكَرِيمِ ، مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ ، أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا ، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ».", c: 1},   
      {t: "«سُبْحَانَ اللهِ وَبِحَمْدِهِ».", c: 100}
            ],
          
            sleep: [
         
               
         
                {t: "«بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ، فَإِنْ أَمْسَكْتَ نَفْسِي فَارْحَمْهَا، وَإِنْ أَرْسَلْتَهَا فَاحْفَظْهَا بِمَا تَحْفَظُ بِهِ عِبَادَكَ الصَّالِحِينَ».", c: 1},
                
                {t: "سورة الملك (المنجية من عذاب القبر).", c: 1},
                {t: "«اللهم قني عذابك يوم تبعث عبادك».", c: 3}
            ],
           
        };

        let db = JSON.parse(localStorage.getItem('ultra_azkar_db')) || initialData;

        function initRoyalApp() {
            applyNewColor(royalTheme);
            updateClocks();
            setInterval(updateClocks, 60000);
            document.getElementById('totalCounterDisplay').innerText = totalStats.toString().padStart(4, '0');
        }

        function updateClocks() {
            const now = new Date();
            document.getElementById('gDateDisplay').innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
            try {
                const h = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma-nu-arab', {day:'numeric', month:'long'}).format(now);
                document.getElementById('hDateDisplay').innerText = h;
            } catch(e) { document.getElementById('hDateDisplay').innerText = "جاري القراءة"; }
        }

        function applyNewColor(color) {
            royalTheme = color;
            document.documentElement.style.setProperty('--royal-color', color);
            document.getElementById('royalHeader').style.background = `linear-gradient(180deg, ${color} 0%, #000 100%)`;
            localStorage.setItem('ultra_theme_color', color);
        }

        function toggleEditor() { document.getElementById('editorPanel').classList.toggle('hidden'); }

        function saveZkrToDB() {
            const sec = document.getElementById('selSection').value;
            const txt = document.getElementById('inText').value;
            const count = document.getElementById('inCount').value;
            if(txt && count) {
                db[sec].push({t: txt, c: parseInt(count)});
                localStorage.setItem('ultra_azkar_db', JSON.stringify(db));
                alert("تمت الإضافة!");
                toggleEditor();
                if(!document.getElementById('categoryView').classList.contains('hidden')) openCategory(sec);
            }
        }

        function openCategory(type) {
            document.getElementById('gridHome').classList.add('hidden');
            document.getElementById('categoryView').classList.remove('hidden');
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            db[type].forEach((item, i) => {
                container.innerHTML += `
                    <div id="unit-${type}-${i}" onclick="processClick('${type}', ${i}, ${item.c})" class="zkr-node p-7 mb-4">
                        <div class="flex justify-between items-center mb-5">
                            <span class="text-[10px] font-black opacity-40 uppercase">المطلوب: ${item.c}</span>
                            <span id="val-${type}-${i}" class="text-3xl font-black font-mono">${item.c}</span>
                        </div>
                        <p class="text-right font-bold text-xl leading-relaxed mb-6">${item.t}</p>
                        <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                            <div id="bar-${type}-${i}" class="glow-bar" style="width: 0%"></div>
                        </div>
                        <button onclick="removeItem('${type}', ${i})" class="mt-4 text-[10px] text-red-500 opacity-30">حذف</button>
                    </div>
                `;
            });
            window.scrollTo(0,0);
        }

        function processClick(type, idx, max) {
            const numLabel = document.getElementById(`val-${type}-${idx}`);
            const bar = document.getElementById(`bar-${type}-${idx}`);
            const card = document.getElementById(`unit-${type}-${idx}`);
            let val = parseInt(numLabel.innerText);
            if (val > 0) {
                val--;
                totalStats++;
                numLabel.innerText = val;
                document.getElementById('totalCounterDisplay').innerText = totalStats.toString().padStart(4, '0');
                localStorage.setItem('ultra_total_clicks', totalStats);
                bar.style.width = ((max - val) / max * 100) + '%';
                if (navigator.vibrate) navigator.vibrate(45);
                if (val === 0) {
                    const overlay = document.createElement('div');
                    overlay.className = 'done-mark';
                    overlay.innerHTML = '<i class="fas fa-check-double text-4xl mb-2"></i><span class="font-black">تقبل الله</span>';
                    card.appendChild(overlay);
                }
            }
        }

        function removeItem(type, index) {
            event.stopPropagation();
            if(confirm("هل تريد الحذف؟")) {
                db[type].splice(index, 1);
                localStorage.setItem('ultra_azkar_db', JSON.stringify(db));
                openCategory(type);
            }
        }

        function backToHome() {
            document.getElementById('categoryView').classList.add('hidden');
            document.getElementById('gridHome').classList.remove('hidden');
        }

        function factoryReset() {
            if(confirm("تصفير الكل؟")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
