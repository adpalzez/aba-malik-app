<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة أبا مالك | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.5s; background-attachment: fixed; overflow-x: hidden; }
        .glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; }
        .bg-image { background-image: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); background-size: cover; background-position: center; }
        
        /* تأثيرات الوضع الفاتح */
        body.light-mode { background-color: #f0f2f5; color: #1a1a1a; }
        body.light-mode .bg-image { background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://i.ibb.co/pBhzxHdM/1000027317.jpg'); }
        body.light-mode .glass { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.1); color: #1a1a1a; }

        /* صفحات SPA */
        .page { display: none; width: 100%; max-width: 450px; animation: fadeIn 0.5s; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; }
        .full-width { grid-column: span 2; }
        
        /* ألوان الأزرار */
        .btn-mosque { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; }
        .btn-azkar { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); color: #3b82f6; }
        .btn-wisdom { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); color: #fbbf24; }
        .btn-rating { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.4); color: #f43f5e; }
        
        .btn-premium { transition: 0.3s; }
        .btn-premium:active { transform: scale(0.92); filter: brightness(1.2); }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 15px 10px 30px; display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: rgba(255,255,255,0.3); transition: 0.3s; font-size: 1.3rem; cursor: pointer; }
        .nav-item.active { color: #fbbf24; transform: translateY(-8px); text-shadow: 0 0 15px #fbbf24; }
        
        .points-badge { background: linear-gradient(135deg, #fbbf24, #d97706); box-shadow: 0 4px 20px rgba(217, 119, 6, 0.5); }
        .prayer-bar { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 4px 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white min-h-screen bg-image flex flex-col items-center p-4 pb-32">

    <header class="w-full max-w-md flex justify-between items-center mb-8 mt-2 z-[1001] sticky top-2">
        <button id="themeToggle" class="glass w-10 h-10 flex items-center justify-center border border-white/10 active:scale-90 transition">
            <i id="themeIcon" class="fas fa-moon text-yellow-400"></i>
        </button>

        <div class="prayer-bar flex items-center gap-3 animate__animated animate__fadeInDown">
            <span id="nextPrayerName" class="text-[10px] font-bold text-yellow-500 uppercase tracking-tighter">الصلاة</span>
            <span id="prayerTimer" class="text-xs font-mono font-black text-white">00:00:00</span>
        </div>

        <div class="points-badge px-4 py-1.5 rounded-full flex items-center gap-2">
            <i class="fas fa-star text-white text-[10px]"></i>
            <span class="text-xs font-black" id="userPoints">0</span>
        </div>
    </header>

    <div id="homePage" class="page active">
        <main class="glass w-full p-8 text-center mb-6 border border-white/5">
            <h2 class="text-4xl font-black mb-1 tracking-tighter">أبا مالك العقيلي</h2>
            <p class="text-blue-400 text-[9px] font-bold tracking-[0.4em] uppercase mb-10 opacity-80">المملكة النخبوية 2026</p>

            <div class="bg-white/5 rounded-[30px] p-5 mb-8 border border-white/5">
                <p class="text-[9px] text-gray-500 mb-4 uppercase font-black tracking-widest text-right">نبض القلب الآن</p>
                <div class="flex justify-between items-center px-4">
                    <button onclick="setMood('happy')" class="text-3xl hover:scale-125 transition drop-shadow-lg">😊</button>
                    <button onclick="setMood('grateful')" class="text-3xl hover:scale-125 transition drop-shadow-lg">🤲</button>
                    <button onclick="setMood('anxious')" class="text-3xl hover:scale-125 transition drop-shadow-lg">😟</button>
                    <button onclick="setMood('tired')" class="text-3xl hover:scale-125 transition drop-shadow-lg">😴</button>
                </div>
            </div>

            <button id="installApp" class="hidden full-width bg-white/10 border border-dashed border-white/30 py-4 rounded-[25px] mb-6 flex items-center justify-center gap-2 animate__animated animate__bounceIn">
                <i class="fas fa-download text-blue-400"></i>
                <span class="text-[10px] font-bold">تثبيت التطبيق على هاتفك</span>
            </button>

            <div class="menu-grid mb-8">
                <button onclick="showPage('mosquePage')" class="btn-mosque btn-premium p-5 rounded-[30px] flex flex-col items-center gap-3">
                    <i class="fas fa-mosque text-2xl"></i>
                    <span class="text-[10px] font-black uppercase">المسجد</span>
                </button>
                <button onclick="showPage('azkarPage')" class="btn-azkar btn-premium p-5 rounded-[30px] flex flex-col items-center gap-3">
                    <i class="fas fa-book-open text-2xl"></i>
                    <span class="text-[10px] font-black uppercase">الأذكار</span>
                </button>
                <button id="wisdomBtn" class="btn-wisdom btn-premium p-5 rounded-[30px] flex flex-col items-center gap-3">
                    <i class="fas fa-lightbulb text-2xl"></i>
                    <span class="text-[10px] font-black uppercase">الحكمة</span>
                </button>
                <button onclick="openRating()" class="btn-rating btn-premium p-5 rounded-[30px] flex flex-col items-center gap-3">
                    <i class="fas fa-star text-2xl"></i>
                    <span class="text-[10px] font-black uppercase">التقييم</span>
                </button>
                
                <a href="games.html" class="full-width bg-gradient-to-r from-emerald-900 to-green-600 py-5 rounded-[30px] flex items-center justify-center gap-3 shadow-xl">
                    <i class="fas fa-chess-rook text-xl text-yellow-400"></i>
                    <span class="text-xs font-black text-white">دخول مملكة صلاح الدين</span>
                </a>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="https://wa.me/201113412908" class="bg-[#2ecc71] py-4 rounded-2xl text-[11px] font-black flex justify-center items-center gap-2 shadow-lg"><i class="fab fa-whatsapp text-lg"></i> واتساب</a>
                <a href="tel:+201113412908" class="bg-white text-black py-4 rounded-2xl text-[11px] font-black flex justify-center items-center gap-2 shadow-lg"><i class="fas fa-phone-alt"></i> اتصال</a>
            </div>
        </main>
    </div>

    <div id="mosquePage" class="page">
        <div class="glass w-full p-8 text-center border border-green-500/20">
            <h3 class="text-2xl font-black mb-6">مواقيت الصلاة</h3>
            <div id="prayerList" class="space-y-4 w-full"></div>
            <button onclick="showPage('homePage')" class="mt-10 py-3 px-8 bg-white/5 rounded-full text-[10px] font-bold uppercase">العودة للرئيسية</button>
        </div>
    </div>

    <div id="postsPage" class="page">
        <section class="glass w-full p-6 mb-6 border border-blue-500/20">
            <textarea id="postInput" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white placeholder-gray-500 focus:outline-none" placeholder="اكتب خاطرة جديدة يا أبا مالك..." rows="3"></textarea>
            <button onclick="addNewPost()" class="w-full bg-blue-600 mt-4 py-4 rounded-[25px] text-xs font-black shadow-xl">نشر في المملكة</button>
        </section>
        <div class="posts-container w-full space-y-4"></div>
    </div>

    <div id="azkarPage" class="page">
        <div class="glass w-full p-8">
            <h3 class="text-2xl font-black mb-8 text-center text-blue-400">موسوعة الأذكار</h3>
            <div class="space-y-4" id="azkarList">
                <div class="bg-white/5 p-6 rounded-[25px] border border-white/10 text-center font-bold">أذكار الصباح والمساء</div>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div onclick="showPage('homePage')" class="nav-item active" data-page="homePage"><i class="fas fa-home"></i></div>
        <div onclick="showPage('mosquePage')" class="nav-item" data-page="mosquePage"><i class="fas fa-mosque"></i></div>
        <div onclick="showPage('postsPage')" class="nav-item" data-page="postsPage"><i class="fas fa-paper-plane"></i></div>
        <div onclick="showPage('azkarPage')" class="nav-item" data-page="azkarPage"><i class="fas fa-book-open"></i></div>
    </nav>

    <div id="wisdomModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="glass p-10 max-w-sm w-full text-center border-2 border-yellow-500/30">
            <i class="fas fa-quote-right text-yellow-500 text-5xl mb-6"></i>
            <div id="wisdomText" class="text-lg font-black leading-relaxed mb-10 text-white"></div>
            <button onclick="document.getElementById('wisdomModal').classList.add('hidden')" class="w-full py-4 bg-yellow-600 rounded-full font-black text-white">آمنت بالله</button>
        </div>
    </div>

    <div id="ratingModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass p-6 max-w-sm w-full text-center relative border-2 border-orange-500/50">
            <button onclick="document.getElementById('ratingModal').classList.add('hidden')" class="absolute top-4 left-4 text-gray-400"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6">رأيك يهمنا</h3>
            <div class="flex justify-center gap-2 mb-6 text-4xl">
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="1"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="2"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="3"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="4"></i>
                <i class="far fa-star cursor-pointer text-gray-500 star-btn" data-value="5"></i>
            </div>
            <textarea id="ratingComment" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm placeholder-gray-500 focus:outline-none text-white" placeholder="اكتب ملاحظاتك..." rows="3"></textarea>
            <button id="submitRatingBtn" class="bg-orange-600 text-white px-8 py-4 rounded-full font-black w-full opacity-50 mt-4" disabled>إرسال</button>
        </div>
    </div>

    <footer class="mt-auto py-8 text-center opacity-30">
        <p class="text-[10px] font-bold tracking-[0.2em] uppercase">
            &copy; 2026 جميع الحقوق محفوظة | أبا مالك العقيلي
        </p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="app.js"></script>

    <script>
        // دالة التنقل بين الصفحات SPA
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.getAttribute('data-page') === pageId) item.classList.add('active');
            });
            window.scrollTo(0, 0);
        }
    </script>
</body>
    </html>
