<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف أبا مالك | تقليب الصفحات</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root { --bg-paper: #f4ece1; --text-dark: #2c2c2c; }
        body { font-family: 'Cairo', sans-serif; background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* حاوية المصحف */
        #book-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; perspective: 2000px; }
        
        .page { background-color: var(--bg-paper); width: 100%; height: 100%; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); border-radius: 5px; overflow: hidden; }
        
        .page-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .page img { width: 92%; height: 92%; object-fit: contain; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* شريط التحكم السفلي */
        .controls { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-around; align-items: center; color: white; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .page-num { background: #c5a059; color: black; padding: 2px 12px; border-radius: 15px; font-weight: 900; font-size: 14px; }
        
        .btn-action { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-action:active { background: #c5a059; transform: scale(0.9); }

        /* حالة التحميل */
        #loading { position: fixed; inset: 0; background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #c5a059; }
        .spinner { border: 4px solid rgba(197, 160, 89, 0.1); border-top: 4px solid #c5a059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p class="font-bold">جاري تجهيز المصحف الشريف...</p>
    </div>

    <div id="book-container">
        <div id="myBook" style="display: none;">
            </div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="pageFlip.flipPrev()"><i class="fas fa-chevron-right"></i></button>
        <div class="flex flex-col items-center">
            <span class="text-[10px] opacity-60 font-bold mb-1">الصفحة الحالية</span>
            <span id="currentPageDisplay" class="page-num">1</span>
        </div>
        <button class="btn-action" onclick="pageFlip.flipNext()"><i class="fas fa-chevron-left"></i></button>
    </div>

    <script>
        let pageFlip;
        const totalPages = 604;
        const bookElement = document.getElementById('myBook');

        // توليد الصفحات برمجياً
        function createPages() {
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                // رابط صور المصحف (المدينة المنورة)
                const imgUrl = `https://pcloud.github.io/quran-ayats/600/${i}.png`;
                html += `
                    <div class="page" data-density="hard">
                        <div class="page-content">
                            <img src="${imgUrl}" loading="lazy" alt="صفحة ${i}">
                        </div>
                    </div>
                `;
            }
            bookElement.innerHTML = html;
        }

        function initPageFlip() {
            const width = window.innerWidth > 600 ? 500 : window.innerWidth - 40;
            const height = window.innerHeight - 150;

            pageFlip = new St.PageFlip(bookElement, {
                width: width,
                height: height,
                size: "stretch",
                minWidth: 300,
                maxWidth: 600,
                minHeight: 400,
                maxHeight: 1000,
                drawShadow: true,
                flippingTime: 800,
                usePortrait: true,
                startPage: 0,
                showCover: false,
                mobileScrollSupport: false 
            });

            pageFlip.loadFromHTML(document.querySelectorAll(".page"));

            // تحديث رقم الصفحة عند التقليب
            pageFlip.on('flip', (e) => {
                document.getElementById('currentPageDisplay').innerText = e.data + 1;
            });

            // إخفاء شاشة التحميل
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                bookElement.style.display = 'block';
            }, 2000);
        }

        // بدء التشغيل
        createPages();
        
        // التأكد من تحميل المكتبة أولاً
        window.addEventListener('load', () => {
            if (typeof St !== 'undefined') {
                initPageFlip();
            }
        });
    </script>
</body>
    </html>
