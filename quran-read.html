<script>
    // جلب الصور من مصدر مستقر ( raw.githubusercontent.com ) لضمان عدم ظهور صفحات فارغة
    function initPages() {
        let html = '';
        for (let i = 1; i <= 604; i++) {
            const imgUrl = `https://raw.githubusercontent.com/itxtools/quran-images/master/images/${i}.png`;
            html += `
            <div class="swiper-slide">
                <img src="${imgUrl}" alt="صفحة ${i}" loading="lazy" onerror="this.src='https://via.placeholder.com/600x800?text=جاري+التحميل...'">
            </div>`;
        }
        document.getElementById('quranSlider').innerHTML = html;
    }
</script>
