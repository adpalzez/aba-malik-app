        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; transition: all 0.5s ease; }

        .rating-btn { background: linear-gradient(90deg, #f59e0b, #d97706); color: white; }
        .games-btn { background: linear-gradient(to r, #064e3b, #065f46); color: white; }

        .post-btn-fixed { position: fixed; bottom: 30px; left: 20px; z-index: 1000; background: linear-gradient(90deg, #dc2626, #991b1b); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(220, 38, 38, 0.5); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #0f172a; animation: pulse-badge 2s infinite; }
        
        /* تعديل مواقع الأزرار لتناسب الشريط العلوي */
        #installBtn { position: fixed; top: 60px; right: 20px; z-index: 100; display: none; }
        .theme-toggle { position: fixed; top: 60px; left: 20px; z-index: 100; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .star-btn { transition: transform 0.2s; }
        .star-btn:active { transform: scale(1.4); }
    </style>

    <div id="wisdomModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">

    <div id="ratingModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">

            <button onclick="closeRating()" class="absolute top-4 left-4 text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-2">تقييمك يهمنا</h3>
            <p class="text-[10px] text-gray-400 mb-6">كم نجمة يستحق تطبيق أبا مالك؟</p>
            <div class="flex justify-center gap-3 mb-8 text-4xl">
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(1)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(2)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(3)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(4)"></i>
                <i class="far fa-star cursor-pointer text-gray-400 star-btn" onclick="setRating(5)"></i>
            </div>
            <button id="submitRatingBtn" onclick="submitRating()" class="bg-orange-600 text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg w-full opacity-50 cursor-not-allowed transition" disabled>إرسال التقييم</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="./app.js"></script>
    <script src="./wisdoms.js"></script> 
    <script src="./install.js"></script>

    <script>
        // 1. تبديل الوضع
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeIcon.classList.toggle('fa-sun');
            themeIcon.classList.toggle('fa-moon');
            themeIcon.classList.toggle('text-yellow-400');
            themeIcon.classList.toggle('text-gray-600');
        });

        // 2. إدارة التقييم
        let userRating = 0;
        function openRating() { document.getElementById('ratingModal').classList.replace('hidden', 'flex'); }
        function closeRating() { document.getElementById('ratingModal').classList.replace('flex', 'hidden'); }

        function setRating(n) {
            userRating = n;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((star, i) => {
                if (i < n) {
                    star.classList.replace('far', 'fas');
                    star.classList.add('text-yellow-400');
                } else {
                    star.classList.replace('fas', 'far');
                    star.classList.remove('text-yellow-400');
                }
            });
            const btn = document.getElementById('submitRatingBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function submitRating() {
            if (typeof db !== 'undefined' && userRating > 0) {
                db.collection('ratings').add({
                    stars: userRating,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    alert("شكراً لتقييمك يا بطل!");
                    closeRating();
                });
            }
        }

        // 3. مشاركة الحكمة
        function shareWisdom() {
            const wisdomText = document.getElementById('wisdomText').innerText;
            const text = encodeURIComponent(`من تطبيق أبا مالك العقيلي:\n\n"${wisdomText}"`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        // 4. حالة الأوفلاين
        window.addEventListener('offline', () => alert("أنت الآن تعمل بدون إنترنت - تطبيق أبا مالك جاهز دائماً!"));
    </script>
