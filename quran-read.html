<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف أبا مالك العقيلي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root { --quran-bg: #f4ece1; --text-color: #2c2c2c; --menu-bg: #ffffff; }
        body.dark-mode { --quran-bg: #1a1a1a; --text-color: #ffffff; --menu-bg: #2c2c2c; }
        body { font-family: 'Cairo', sans-serif; background-color: #121212; margin: 0; overflow: hidden; }
        
        /* القائمة الجانبية المطابقة للفيديو */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--menu-bg); z-index: 10000; transition: 0.4s; box-shadow: -5px 0 25px rgba(0,0,0,0.5); color: var(--text-color); }
        #sideMenu.open { right: 0; }
        .menu-header { background: #c5a059; color: black; padding: 30px 20px; font-weight: 900; text-align: center; font-size: 20px; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; cursor: pointer; font-weight: bold; }
        
        /* حاوية الصور */
        .swiper { width: 100%; height: calc(100vh - 70px); background: #222; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: var(--quran-bg); }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        /* التفسير */
        #tafseerPanel { position: fixed; bottom: -50%; left: 0; width: 100%; height: 40%; background: var(--menu-bg); z-index: 9000; transition: 0.4s; padding: 20px; border-radius: 30px 30px 0 0; color: var(--text-color); overflow-y: auto; }
        #tafseerPanel.open { bottom: 0; }

        /* شريط التحكم السفلي */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; color: #fff; z-index: 5000; }
        .page-badge { background: #c5a059; color: black; padding: 4px 15px; border-radius: 15px; font-weight: 900; }
        
        #loadingOverlay { position: fixed; inset: 0; background: #121212; z-index: 20000; display: flex; flex-direction: column; items: center; justify-content: center; color: #c5a059; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#c5a059] mb-4"></div>
        <p class="font-black">جاري تحميل صفحات المصحف...</p>
    </div>

    <div id="sideMenu">
        <div class="menu-header">إعدادات المصحف</div>
        <div class="menu-item" onclick="toggleTafseer()"><i class="fas fa-book-open"></i> التفسير الميسر</div>
        <div class="menu-item" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div class="menu-item" onclick="alert('الفهرس جاري تجهيزه...')"><i class="fas fa-list"></i> فهرس السور</div>
        <div class="menu-item" onclick="window.location.href='mosque.html'"><i class="fas fa-home"></i> العودة للرئيسية</div>
    </div>

    <div id="tafseerPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-black text-lg">التفسير الميسر</h3>
            <i class="fas fa-times cursor-pointer text-xl" onclick="toggleTafseer()"></i>
        </div>
        <p id="tafseerText">سيظهر تفسير الصفحة هنا...</p>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="quranSlider">
            </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right text-2xl"></i></div>
        <div class="flex flex-col items-center" onclick="toggleMenu()">
            <span id="pageNumber" class="page-badge">1</span>
            <span class="text-[10px] mt-1 font-bold">القائمة</span>
        </div>
        <div class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left text-2xl"></i></div>
    </div>

    <script>
        const slider = document.getElementById('quranSlider');
        
        // جلب الصور من مصدر بديل وموثوق (Archive.org - مصحف المدينة)
        function initPages() {
            let html = '';
            for (let i = 1; i <= 604; i++) {
                // نستخدم نظام الترقيم بـ 3 خانات (001, 002...) لضمان عمل الرابط
                const pageNum = i.toString().padStart(3, '0');
                const imgUrl = `https://raw.githubusercontent.com/itxtools/quran-images/master/images/${i}.png`;
                html += `
                <div class="swiper-slide">
                    <img src="${imgUrl}" alt="صفحة ${i}" onerror="this.src='https://via.placeholder.com/600x800?text=جاري+التحميل...'">
                </div>`;
            }
            slider.innerHTML = html;
        }

        initPages();

        // تشغيل المحرك
        const swiper = new Swiper(".mySwiper", {
            direction: "horizontal",
            loop: false,
            // تقليب الصفحات مثل الكتاب
            effect: "creative",
            creativeEffect: {
                prev: { shadow: true, translate: ["-20%", 0, -1] },
                next: { translate: ["100%", 0, 0] },
            },
            on: {
                init: function() {
                    document.getElementById('loadingOverlay').style.display = 'none';
                },
                slideChange: function () {
                    document.getElementById('pageNumber').innerText = this.activeIndex + 1;
                }
            },
            navigation: {
                nextEl: "#nextBtn",
                prevEl: "#prevBtn",
            },
        });

        // وظائف القائمة الجانبية
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            toggleMenu();
        }

        function toggleTafseer() {
            const panel = document.getElementById('tafseerPanel');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) {
                document.getElementById('tafseerText').innerText = "تفسير الصفحة رقم " + (swiper.activeIndex + 1) + " : جاري جلب البيانات...";
            }
            toggleMenu();
        }
    </script>
</body>
    </html>
