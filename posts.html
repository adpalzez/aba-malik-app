<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركات أبا مالك العقيلي | المنصة التفاعلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .post-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; overflow: hidden; margin-bottom: 24px; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ef4444; object-fit: cover; }
        .interaction-btn { color: #94a3b8; transition: all 0.2s; font-size: 0.85rem; padding: 6px 12px; border-radius: 99px; }
        .interaction-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .comment-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .comment-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 8px 12px; margin-top: 6px; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md p-4 border-b border-white/10 flex justify-between items-center">
        <a href="index.html" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-arrow-right text-xl"></i></a>
        <h1 class="text-xl font-black tracking-widest text-red-500 uppercase">ABA MALIK POSTS</h1>
        <div class="w-6"></div> 
    </header>

    <div class="container mx-auto px-4 py-6 max-w-md" id="postsContainer">
        <div class="post-card p-4 animate__animated animate__fadeIn mb-8 border-2 border-red-500/20">
            <textarea id="postText" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 transition" placeholder="ماذا يدور في ذهنك يا أبا مالك؟"></textarea>
            <div id="previewArea" class="hidden mt-3 rounded-xl overflow-hidden border border-red-500/30">
                <img id="imagePreview" src="#" class="hidden w-full h-48 object-cover">
                <video id="videoPreview" controls class="hidden w-full h-48 bg-black"></video>
            </div>
            <div class="flex justify-between items-center mt-4">
                <div class="flex gap-3 text-gray-400">
                    <button onclick="document.getElementById('fileInput').click()" class="hover:text-red-500 transition"><i class="fas fa-image text-xl"></i></button>
                    <button onclick="document.getElementById('videoInput').click()" class="hover:text-blue-500 transition"><i class="fas fa-video text-xl"></i></button>
                </div>
                <button id="uploadBtn" onclick="publishPost()" class="bg-red-600 px-8 py-2.5 rounded-full font-bold text-sm shadow-lg active:scale-95 transition">نشر</button>
            </div>
        </div>

        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <input type="file" id="videoInput" class="hidden" accept="video/*">

        <div id="dynamicPosts"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDOk3e9s7suX4eR7kviyo31ZkEU_25AuJQ",
          authDomain: "planning-with-ai-8d3e9.firebaseapp.com",
          projectId: "planning-with-ai-8d3e9",
          storageBucket: "planning-with-ai-8d3e9.firebasestorage.app",
          messagingSenderId: "872108863700",
          appId: "1:872108863700:web:7b2612a11bfa185b21cb41"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        const previewFile = (input, isVideo) => {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('previewArea').classList.remove('hidden');
                const img = document.getElementById('imagePreview');
                const vid = document.getElementById('videoPreview');
                if (isVideo) { vid.src = url; vid.classList.remove('hidden'); img.classList.add('hidden'); }
                else { img.src = url; img.classList.remove('hidden'); vid.classList.add('hidden'); }
            }
        };
        document.getElementById('fileInput').onchange = () => previewFile(document.getElementById('fileInput'), false);
        document.getElementById('videoInput').onchange = () => previewFile(document.getElementById('videoInput'), true);

        async function publishPost() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0] || document.getElementById('videoInput').files[0];
            if (!text && !file) return alert("اكتب شيئاً أولاً");
            const btn = document.getElementById('uploadBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
            try {
                let fileUrl = null; let fileType = 'text';
                if (file) {
                    const ref = storage.ref(`posts/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    fileUrl = await ref.getDownloadURL();
                    fileType = file.type.includes('video') ? 'video' : 'image';
                }
                await db.collection("all_posts").add({
                    content: text, url: fileUrl, type: fileType,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    user: "أبا مالك العقيلي", likesCount: 0, commentsCount: 0
                });
                document.getElementById('postText').value = "";
                document.getElementById('previewArea').classList.add('hidden');
            } catch (err) { alert("تأكد من تفعيل قواعد الحماية (Rules) في Firebase: " + err.message); }
            finally { btn.innerHTML = "نشر"; btn.disabled = false; }
        }

        db.collection("all_posts").orderBy("timestamp", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const post = doc.data();
                const postId = doc.id;
                html += `
                    <div class="post-card animate__animated animate__fadeInUp">
                        <div class="p-4 flex items-center gap-3">
                            <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="profile-img">
                            <div><h4 class="font-bold text-sm">${post.user}</h4><span class="text-[10px] text-gray-400">إشراف هندسي</span></div>
                        </div>
                        <div class="px-4 pb-3"><p class="text-sm">${post.content || ''}</p></div>
                        ${post.url ? (post.type === 'video' ? `<video src="${post.url}" controls class="w-full bg-black"></video>` : `<img src="${post.url}" class="w-full object-cover">`) : ''}
                        <div class="p-2 border-t border-white/5 flex justify-around">
                            <button onclick="toggleLike('${postId}')" class="interaction-btn flex items-center gap-2"><i class="far fa-heart"></i> ${post.likesCount || 0}</button>
                            <button onclick="toggleComments('${postId}')" class="interaction-btn flex items-center gap-2"><i class="far fa-comment"></i> ${post.commentsCount || 0}</button>
                        </div>
                        <div id="comments-section-${postId}" class="hidden px-4 pb-4 bg-white/5">
                            <div id="comments-list-${postId}" class="text-xs space-y-2 py-2"></div>
                            <div class="flex gap-2">
                                <input id="comment-input-${postId}" type="text" class="comment-input flex-grow p-2 text-xs text-white outline-none" placeholder="رد...">
                                <button onclick="addComment('${postId}')" class="text-red-500"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('dynamicPosts').innerHTML = html;
        });

        async function toggleLike(postId) {
            await db.collection("all_posts").doc(postId).update({ likesCount: firebase.firestore.FieldValue.increment(1) });
        }
        function toggleComments(postId) {
            const section = document.getElementById(`comments-section-${postId}`);
            if(section.classList.toggle('hidden')) return;
            db.collection("all_posts").doc(postId).collection("comments").orderBy("timestamp", "asc").onSnapshot(snap => {
                let cHtml = ''; snap.forEach(c => { cHtml += `<div class="comment-card"><b>${c.data().user}:</b> ${c.data().text}</div>`; });
                document.getElementById(`comments-list-${postId}`).innerHTML = cHtml || 'لا يوجد ردود';
            });
        }
        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            if(!input.value) return;
            await db.collection("all_posts").doc(postId).collection("comments").add({ text: input.value, user: "زائر", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("all_posts").doc(postId).update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
            input.value = "";
        }
    </script>
</body>
</html>
