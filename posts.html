<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أبا مالك العقيلي - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .post-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; margin-bottom: 24px; }
        .pulse-dot { display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 0 rgba(16, 185, 129, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-md p-4 border-b border-white/10 flex justify-between items-center text-white">
        <h1 class="text-xl font-black text-red-500 uppercase tracking-widest">ABA MALIK LIVE</h1>
        <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full text-xs border border-white/10">
            <span class="pulse-dot"></span>
            <span class="font-bold">المشاهدات: <span id="onlineCount" class="text-red-500">452</span></span>
        </div> 
    </header>

    <div class="container mx-auto px-4 py-6 max-w-md">
        
        <div class="post-card animate__animated animate__fadeInDown border-2 border-red-600/30 shadow-2xl overflow-hidden mb-10">
            <div class="p-4 flex items-center gap-3 bg-white/5">
                <div class="relative">
                    <img src="https://i.ibb.co/pBhzxHdM/1000027317.jpg" class="w-11 h-11 rounded-full border-2 border-red-600">
                    <span class="absolute bottom-0 right-0 bg-green-500 w-3 h-3 rounded-full border-2 border-[#0f172a]"></span>
                </div>
                <div>
                    <h4 class="font-bold text-sm">أبا مالك العقيلي</h4>
                    <span class="text-[10px] text-red-500 font-bold uppercase tracking-widest animate-pulse"><i class="fas fa-video"></i> بث مباشر الآن</span>
                </div>
            </div>
            
            <div class="relative">
                <div class="absolute top-4 right-4 z-10 flex items-center gap-2 bg-red-600 px-3 py-1.5 rounded-lg animate-pulse shadow-xl">
                    <span class="w-2 h-2 bg-white rounded-full"></span>
                    <span class="text-[10px] font-black text-white uppercase">LIVE</span>
                </div>
                <video controls class="w-full bg-black aspect-video shadow-2xl">
                    <source src="./1000031920.mp4" type="video/mp4">
                    متصفحك  يدعم تشغيل الفيديو.
                </video>
            </div>
            <div class="px-5 py-4 text-xs text-gray-300 leading-relaxed bg-white/5">
                شرح هندسي وتطبيقي لاتصال قاعدة البيانات من قلب الميدان.
            </div>
        </div>

        <div class="post-card p-4 border-2 border-white/10 bg-white/5 mb-8">
            <textarea id="postText" rows="2" class="w-full bg-transparent text-sm focus:outline-none text-white border-none" placeholder="اكتب تحديثاً من الموقع يا أبا مالك..."></textarea>
            <div id="previewArea" class="hidden mt-3 rounded-xl overflow-hidden border border-red-500/30 shadow-inner">
                <img id="imagePreview" class="hidden w-full h-48 object-cover">
                <video id="videoPreview" controls class="hidden w-full h-48 bg-black"></video>
            </div>
            <div class="flex justify-between items-center mt-4 border-t border-white/10 pt-4">
                <div class="flex gap-5 text-gray-400">
                    <button onclick="document.getElementById('imageInput').click()" class="hover:text-red-500 transition-all scale-110"><i class="fas fa-camera text-xl"></i></button>
                    <button onclick="document.getElementById('videoInput').click()" class="hover:text-blue-500 transition-all scale-110"><i class="fas fa-video text-xl"></i></button>
                </div>
                <button id="uploadBtn" onclick="publishPost()" class="bg-red-600 px-6 py-2 rounded-full font-black text-[10px] shadow-lg active:scale-95 transition-all">
                    نشر مباشر <i class="fas fa-paper-plane ml-1"></i>
                </button>
            </div>
            <input type="file" id="imageInput" class="hidden" accept="image/*">
            <input type="file" id="videoInput" class="hidden" accept="video/*">
        </div>

        <div id="dynamicPosts"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDOk3e9s7suX4eR7kviyo31ZkEU_25AuJQ",
          authDomain: "planning-with-ai-8d3e9.firebaseapp.com",
          projectId: "planning-with-ai-8d3e9",
          storageBucket: "planning-with-ai-8d3e9.appspot.com",
          messagingSenderId: "872108863700",
          appId: "1:872108863700:web:7b2612a11bfa185b21cb41"
        };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        // محاكاة الاتصال المباشر
        setInterval(() => {
            const el = document.getElementById('onlineCount');
            if(el) {
                let count = parseInt(el.innerText);
                el.innerText = count + (Math.floor(Math.random() * 5) - 2);
            }
        }, 5000);

        // وظائف المعاينة والنشر
        function handlePreview(input, isVideo) {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('previewArea').classList.remove('hidden');
                if (isVideo) { document.getElementById('videoPreview').src = url; document.getElementById('videoPreview').classList.remove('hidden'); document.getElementById('imagePreview').classList.add('hidden'); }
                else { document.getElementById('imagePreview').src = url; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('videoPreview').classList.add('hidden'); }
            }
        }
        document.getElementById('imageInput').onchange = (e) => handlePreview(e.target, false);
        document.getElementById('videoInput').onchange = (e) => handlePreview(e.target, true);

        async function publishPost() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('imageInput').files[0] || document.getElementById('videoInput').files[0];
            const btn = document.getElementById('uploadBtn');
            if (!text && !file) return alert("اكتب شيئاً للميدان!");
            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i>'; btn.disabled = true;
            try {
                let fileUrl = null; let fileType = 'text';
                if (file) {
                    const ref = storage.ref(`live_merged/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    fileUrl = await ref.getDownloadURL();
                    fileType = file.type.includes('video') ? 'video' : 'image';
                }
                await db.collection("final_merged_posts").add({
                    content: text, url: fileUrl, type: fileType,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    user: "أبا مالك العقيلي", likes: 0
                });
                document.getElementById('postText').value = "";
                document.getElementById('previewArea').classList.add('hidden');
            } catch (err) { alert("خطأ في الاتصال"); }
            finally { btn.innerHTML = 'نشر مباشر <i class="fas fa-paper-plane ml-1"></i>'; btn.disabled = false; }
        }

        db.collection("final_merged_posts").orderBy("timestamp", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const post = doc.data();
                html += `
                    <div class="post-card animate__animated animate__fadeInUp">
                        <div class="p-4 flex justify-between items-center bg-white/5 text-[10px]">
                            <span class="font-bold text-gray-400">أبا مالك العقيلي</span>
                            <button onclick="deletePost('${doc.id}', '${post.url}')" class="text-gray-600 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="px-5 py-3 text-sm">${post.content || ''}</div>
                        ${post.url ? (post.type === 'video' ? `<video src="${post.url}" controls class="w-full bg-black"></video>` : `<img src="${post.url}" class="w-full">`) : ''}
                        <div class="p-2 border-t border-white/5 flex gap-4 bg-white/5">
                            <button onclick="addLike('${doc.id}')" class="text-xs text-gray-400 hover:text-red-500 transition"><i class="far fa-heart"></i> إعجاب</button>
                        </div>
                    </div>`;
            });
            document.getElementById('dynamicPosts').innerHTML = html;
        });

        async function addLike(id) { await db.collection("final_merged_posts").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); }
        async function deletePost(id, url) { if(confirm("حذف نهائي؟")) { await db.collection("final_merged_posts").doc(id).delete(); if(url) try{ await storage.refFromURL(url).delete(); } catch(e){} } }
    </script>
</body>
                </html>
