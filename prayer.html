<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن المسجد - أبا مالك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #064e3b; color: white; margin: 0; padding: 0; }
        .header-gradient { background: linear-gradient(180deg, #134e4a 0%, #064e3b 100%); border-radius: 0 0 40px 40px; }
        /* تحسين شكل الكروت لتطابق الصورة */
        .prayer-card { background: #f8fafc; color: #1e293b; border-radius: 20px; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .active-prayer { background: #fbbf24 !important; color: #064e3b !important; transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .countdown-display { background: rgba(0,0,0,0.4); border: 1px solid rgba(52, 211, 153, 0.2); border-radius: 25px; }
        .nav-item { transition: 0.3s; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: #fbbf24; }
    </style>
</head>
<body class="pb-32"> <div class="max-w-[450px] mx-auto min-h-screen">
        
        <header class="header-gradient p-6 text-center shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div class="text-right">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">التوقيت الحالي</p>
                    <p id="currentTime" class="text-md font-black text-white">00:00:00</p>
                </div>
                <i class="fas fa-mosque text-4xl text-yellow-500 drop-shadow-lg"></i>
                <div class="text-left">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">الهوية</p>
                    <p class="text-md font-black text-white">أبا مالك العقيلي</p>
                </div>
            </div>

            <div class="countdown-display p-5 mb-6 shadow-inner">
                <p id="nextPrayerLabel" class="text-xs text-emerald-300 font-bold mb-2 italic">جاري الحساب...</p>
                <div id="countdownTimer" class="text-3xl font-black tracking-widest text-white">00 : 00 : 00</div>
            </div>

            <div class="bg-black/30 rounded-3xl p-4 border border-white/10 flex justify-between items-center text-sm">
                <div class="text-right">
                    <p id="hDate" class="text-yellow-500 font-black"></p>
                    <p id="gDate" class="text-white/60 text-[10px]"></p>
                </div>
                <div class="text-left text-[10px] font-bold text-emerald-400 uppercase">
                    <p>الهجري</p>
                    <p>الميلادي</p>
                </div>
            </div>
        </header>

        <main class="px-5 mt-8">
            <div class="bg-white rounded-[40px] p-6 shadow-2xl mb-8">
                <div class="flex justify-between items-center mb-5 px-2">
                    <h2 class="text-xl font-black text-emerald-900">مواقيت الصلاة</h2>
                    <span id="locationTag" class="text-[10px] bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold italic shadow-sm">تحديد تلقائي...</span>
                </div>
                
                <div id="prayerGrid" class="grid grid-cols-3 gap-3">
                    </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="activateCompass()" class="bg-emerald-800/40 p-5 rounded-[30px] border border-emerald-700 text-center active:scale-95 transition">
                    <i id="compassIcon" class="fas fa-compass text-3xl text-yellow-400 mb-2"></i>
                    <p class="font-bold text-xs">اتجاه القبلة</p>
                </button>

                <a href="https://quran.com/ar" target="_blank" class="bg-emerald-800/40 p-5 rounded-[30px] border border-emerald-700 text-center active:scale-95 transition">
                    <i class="fas fa-book-quran text-3xl text-yellow-400 mb-2"></i>
                    <p class="font-bold text-xs">المصحف الكريم</p>
                </a>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#042f2e]/95 backdrop-blur-md p-4 flex justify-around border-t border-white/5 z-[100]">
            <a href="index.html" class="nav-item flex flex-col items-center gap-1">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[9px] font-bold">الرئيسية</span>
            </a>
            <div class="nav-item active flex flex-col items-center gap-1">
                <i class="fas fa-mosque text-xl"></i>
                <span class="text-[9px] font-bold">المسجد</span>
            </div>
        </nav>
    </div>

    <script>
        let timings = {};

        async function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (p) => await getLivePrayers(p.coords.latitude, p.coords.longitude),
                    async () => {
                        await getLivePrayers(30.0444, 31.2357);
                        document.getElementById('locationTag').innerText = "القاهرة (افتراضي)";
                    }
                );
            }
        }

        async function getLivePrayers(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                timings = data.data.timings;
                
                renderUI(data.data);
                startEngine();
            } catch (e) { console.error("Error fetching data"); }
        }

        function renderUI(data) {
            const grid = document.getElementById('prayerGrid');
            const pList = [
                {n:'الفجر', t:timings.Fajr, id:'Fajr'},
                {n:'الشروق', t:timings.Sunrise, id:'Sunrise'},
                {n:'الظهر', t:timings.Dhuhr, id:'Dhuhr'},
                {n:'العصر', t:timings.Asr, id:'Asr'},
                {n:'المغرب', t:timings.Maghrib, id:'Maghrib'},
                {n:'العشاء', t:timings.Isha, id:'Isha'}
            ];

            grid.innerHTML = pList.map(p => `
                <div id="card-${p.id}" class="prayer-card p-4 text-center shadow-sm">
                    <p class="text-[10px] font-bold text-emerald-600 mb-1">${p.n}</p>
                    <p class="font-black text-lg">${p.t.substring(0,5)}</p>
                </div>
            `).join('');

            document.getElementById('hDate').innerText = `${data.date.hijri.day} ${data.date.hijri.month.ar} ${data.date.hijri.year}`;
            document.getElementById('gDate').innerText = data.date.gregorian.date;
        }

        function startEngine() {
            setInterval(() => {
                const now = new Date();
                const prayers = [
                    {n:'الفجر', t:timings.Fajr, id:'Fajr'},
                    {n:'الظهر', t:timings.Dhuhr, id:'Dhuhr'},
                    {n:'العصر', t:timings.Asr, id:'Asr'},
                    {n:'المغرب', t:timings.Maghrib, id:'Maghrib'},
                    {n:'العشاء', t:timings.Isha, id:'Isha'}
                ];

                let next = null;
                let currentIdx = -1;

                prayers.forEach((p, i) => {
                    const [h, m] = p.t.split(':');
                    const d = new Date(); d.setHours(h, m, 0);
                    if (d > now && !next) next = { ...p, d };
                    if (now > d) currentIdx = i;
                });

                // تمييز الكارت النشط
                document.querySelectorAll('.prayer-card').forEach(c => c.classList.remove('active-prayer'));
                if (currentIdx !== -1) document.getElementById(`card-${prayers[currentIdx].id}`).classList.add('active-prayer');

                if (!next) {
                    const [h, m] = prayers[0].t.split(':');
                    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(h, m, 0);
                    next = { ...prayers[0], d };
                }

                const diff = next.d - now;
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);

                document.getElementById('nextPrayerLabel').innerText = `باقي على صلاة ${next.n}`;
                document.getElementById('countdownTimer').innerText = 
                    `${String(hrs).padStart(2,'0')} : ${String(mins).padStart(2,'0')} : ${String(secs).padStart(2,'0')}`;
                
                document.getElementById('currentTime').innerText = now.toLocaleTimeString('ar-EG');
            }, 1000);
        }

        function activateCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    let heading = e.alpha || e.webkitCompassHeading;
                    document.getElementById('compassIcon').style.transform = `rotate(${-heading}deg)`;
                }, true);
            }
        }

        initApp();
    </script>
</body>
    </html>
