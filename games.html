<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة صلاح الدين - الواقعية الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: url('https://i.ibb.co/pBhzxHdM/1000027317.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay { background: rgba(0, 0, 0, 0.85); min-height: 100 screen; }
        .knight-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #eab308; }
        .resource-card { background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(10px); border: 1px solid #4b5563; }
        .attack-anim { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body class="text-white">

<div class="overlay p-4 min-h-screen">
    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/free-music/iron-man-1.mp3" type="audio/mpeg">
    </audio>

    <header class="text-center mb-6 animate__animated animate__fadeIn">
        <h1 class="text-4xl font-black text-yellow-500 mb-2 shadow-lg">مملكة صلاح الدين الأيوبي</h1>
        <div class="flex justify-center gap-4 mb-4">
            <button onclick="toggleMusic()" class="bg-yellow-600 text-black px-4 py-1 rounded-full text-xs font-bold">
                <i class="fas fa-music"></i> تشغيل/إيقاف الموسيقى
            </button>
        </div>
        <p id="rankDisplay" class="text-blue-400 font-bold tracking-widest">القائد العسكري: أبا مالك</p>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/gold-bars.png" class="mx-auto mb-2">
            <div id="goldCount" class="text-2xl font-bold">100</div>
            <span class="text-xs text-yellow-500">خزينة الذهب</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/wood-log.png" class="mx-auto mb-2">
            <div id="woodCount" class="text-2xl font-bold">100</div>
            <span class="text-xs text-amber-500">مخزن الخشب</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/crusader.png" class="mx-auto mb-2">
            <div id="armyCount" class="text-2xl font-bold">0</div>
            <span class="text-xs text-red-500">الجيش النظامي</span>
        </div>
        <div class="resource-card p-4 rounded-2xl text-center">
            <img src="https://img.icons8.com/color/48/castle.png" class="mx-auto mb-2">
            <div id="castleCount" class="text-2xl font-bold">0</div>
            <span class="text-xs text-blue-500">القلاع المشيدة</span>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-gray-800/60 p-6 rounded-3xl border-2 border-yellow-700">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-hammer"></i> العمليات والإنتاج</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="produce('gold')" class="bg-yellow-600 hover:bg-yellow-500 p-4 rounded-xl font-bold text-black shadow-xl transition active:scale-95">
                    <i class="fas fa-coins text-2xl mb-1"></i><br>سك الذهب
                </button>
                <button onclick="produce('wood')" class="bg-amber-800 hover:bg-amber-700 p-4 rounded-xl font-bold text-white shadow-xl transition active:scale-95">
                    <i class="fas fa-tree text-2xl mb-1"></i><br>جمع الخشب
                </button>
            </div>
        </div>

        <div class="bg-gray-800/60 p-6 rounded-3xl border-2 border-red-900">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-fist-raised"></i> التجنيد (الواقعي)</h2>
            <div class="space-y-4">
                <button onclick="buyUnit('army')" class="w-full bg-red-700 hover:bg-red-600 p-4 rounded-xl font-bold flex justify-between items-center px-8 border-b-4 border-red-950">
                    <div class="flex items-center gap-3">
                        <img src="https://img.icons8.com/color/48/swordsman.png" width="30">
                        <span>تدريب محارب</span>
                    </div>
                    <span>💰 50</span>
                </button>
                <button onclick="buyUnit('castle')" class="w-full bg-blue-700 hover:bg-blue-600 p-4 rounded-xl font-bold flex justify-between items-center px-8 border-b-4 border-blue-950">
                    <div class="flex items-center gap-3">
                        <img src="https://img.icons8.com/color/48/fortress.png" width="30">
                        <span>بناء قلعة</span>
                    </div>
                    <span>💰 200 | 🌲 200</span>
                </button>
            </div>
        </div>
    </div>

    <div class="mt-8 bg-black/40 p-6 rounded-3xl">
        <h3 class="text-center font-bold text-yellow-500 mb-4">استعراض القوات العسكرية</h3>
        <div id="armyVisuals" class="flex flex-wrap justify-center gap-2">
            </div>
    </div>

    <footer class="text-center mt-10">
        <a href="index.html" class="inline-block bg-white text-black px-12 py-3 rounded-2xl font-black shadow-2xl hover:bg-yellow-500">
            العودة للديوان
        </a>
    </footer>
</div>

<script>
    let gold = 100; let wood = 100; let army = 0; let castles = 0;
    const music = document.getElementById('bgMusic');

    function toggleMusic() {
        if (music.paused) music.play();
        else music.pause();
    }

    function produce(type) {
        if (type === 'gold') gold += 10;
        else wood += 10;
        playEffect('https://www.soundjay.com/buttons/button-37.mp3');
        update();
    }

    function buyUnit(type) {
        if (type === 'army' && gold >= 50) {
            gold -= 50; army++;
            addSoldierIcon();
            playEffect('https://www.soundjay.com/mechanical/iron-gate-close-1.mp3');
        } else if (type === 'castle' && gold >= 200 && wood >= 200) {
            gold -= 200; wood -= 200; castles++;
        } else {
            alert("الموارد غير كافية يا سيدي القائد!");
        }
        update();
    }

    function addSoldierIcon() {
        const div = document.getElementById('armyVisuals');
        const img = document.createElement('img');
        img.src = "https://img.icons8.com/color/96/knight.png";
        img.className = "w-12 h-12 animate__animated animate__zoomIn";
        div.appendChild(img);
    }

    function playEffect(url) {
        new Audio(url).play();
    }

    function update() {
        document.getElementById('goldCount').innerText = gold;
        document.getElementById('woodCount').innerText = wood;
        document.getElementById('armyCount').innerText = army;
        document.getElementById('castleCount').innerText = castles;
    }
</script>

</body>
</html>
